{% extends 'base.html' %}

{% block content %}

<h3>Submit Assignment: {{ assignment.title }}</h3>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="file" class="form-control mb-3">
    <button class="btn btn-success">Submit</button>
</form>

{% endblock %}
