{% extends 'base.html' %}
{% block content %}

<h3>Create Live Class</h3>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Class Title" class="form-control mb-2">

    <select name="course" class="form-control mb-2">
        {% for course in courses %}
            <option value="{{ course.id }}">{{ course.title }}</option>
        {% endfor %}
    </select>

    <input type="datetime-local" name="date" class="form-control mb-2">

    <input type="text" name="whiteboard" placeholder="Whiteboard Link" class="form-control mb-2">

    <button class="btn btn-success">Create</button>
</form>

{% endblock %}
