<!DOCTYPE html>
<html>
<head>
    <title>Create Live Class</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-6 offset-md-3">
        <div class="card p-4 shadow">
            <h3>Create Live Class</h3>

            <form method="POST">
                {% csrf_token %}

                <select name="course" class="form-control mb-3">
                    {% for course in courses %}
                        <option value="{{ course.id }}">{{ course.title }}</option>
                    {% endfor %}
                </select>

                <input type="text" name="title" class="form-control mb-3" placeholder="Class Title">
                <input type="text" name="meet_link" class="form-control mb-3" placeholder="Google Meet Link">
                <input type="text" name="whiteboard_link" class="form-control mb-3" placeholder="Whiteboard Link">
                <input type="datetime-local" name="date" class="form-control mb-3">

                <button class="btn btn-primary w-100">Create</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
