{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">👨‍🏫 Teacher Dashboard</h2>

<div class="row g-4 mb-4">

    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h2>{{ total_students }}</h2>
            <p>Total Students</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h2>{{ total_classes }}</h2>
            <p>Total Classes</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 text-center">
            <h2>₹{{ total_revenue }}</h2>
            <p>Total Revenue</p>
        </div>
    </div>

</div>

<h4>Your Courses</h4>

<div class="row">
{% for course in courses %}
    <div class="col-md-4">
        <div class="card p-3 mb-3">
            <h5>{{ course.title }}</h5>
        </div>
    </div>
{% endfor %}
</div>

{% endblock %}
