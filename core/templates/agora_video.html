{% extends 'base.html' %}

{% block content %}


    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            overflow:hidden;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            margin-left: 220px;
            padding: 10px;
            gap: 15px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            padding: 10px;
            margin: 0;
        }

        .player video{
            width:100% !important;
            height:100% !important;
            object-fit:cover;
        }

        /* VIDEO */
        .video-section {
            flex: 1;
            display:flex;
            flex-direction:column;
            height:100vh;
            overflow:hidden;
        }

        
        /* VIDEO BOX */
        .video-box {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .video-name{
            position:absolute;
            bottom:8px;
            left:8px;
            background:rgba(0,0,0,0.5);
            color:white;
            padding:4px 8px;
            border-radius:5px;
            font-size:13px;
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* MAIN VIDEO SIZE */
        .main-video .video-box {
            width: 100%;
            height: 100%;
            transform: scale(1);
        }



        /* ACTIVE SPEAKER */
        .active-speaker {
            border: 3px solid #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }


        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 15px;
            color: white;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .video-label span {
            color: white;           /* ensure all text white */
            font-weight: 600;
        }

        .video-box.pinned {
            border: 3px solid gold;
        }

        .video-box.active-speaker {
            border: 3px solid #22c55e;
        }

        .user-name {
            font-weight: 500;
        }

        .video-overlay{
            position:absolute;
            bottom:6px;
            left:6px;
            right:6px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:rgba(0,0,0,0.4);
            padding:4px 8px;
            border-radius:6px;
            color:white;
            font-size:13px;
        }

        .mic-icon {
            font-size: 16px;
        }

        .video-top {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: stretch;
        }
        
        #main-video {
            flex: 1;
            height: 65vh;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
        }

        #main-slot{
            width:100%;
            height:100%;
        }

        #main-slot .video-box{
            width:100%;
            height:100%;
        }

        /* SIDE VIDEOS */
        #side-videos{
            width:100%;
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
            gap:10px;
            padding:10px;
            margin-top:10px;
            min-height:160px;
            max-height:22vh;
            overflow-y:auto;
            background:rgba(255,255,255,0.03);
            border-radius:10px;
            border:2px solid red;
        }
        

        #side-videos .video-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            min-height: 140px;
            background: black;
            border-radius: 10px;
            overflow: hidden;
        }

        /* Optional hover effect */
        .side-videos .video-box:hover {
            transform: scale(1.05);
        }
        

        /* Chat Container */
        #chat-container {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        /* CHAT PANEL */
        #right-panel {
            width: 350px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* CHAT SECTION */
        #chat-section {
            height: 70%;
            background: #ffffff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* RIGHT CHAT */
        .chat-section {
            width: 320px;
            flex-shrink: 0;
            padding: 10px;
        }

        /* Chat Box */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            color: #000;
            font-size: 14px;
        }

        /* Message Bubble */
        .chat-msg {
            padding: 6px 8px;
            margin-bottom: 5px;
            border-radius: 6px;
            background: #f1f5f9;
        }

        /* Input row */
        #chat-input-row {
            display: flex;
            gap: 5px;
        }

        #chat-message-input {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* TOOLS */
        #chat-tools {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        /* Username */
        .chat-user {
            font-weight: bold;
            color: #2563eb;
        }

        /* Controls Row */
        #chat-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* INPUT */
        #chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }


        .chat-input-area input {
            flex: 1;
            padding: 8px;
        }

        #chat-input-area button {
            background: #2563eb;
            color: white;
        }

        /* Emoji Bar */
        #emoji-bar {
            display: flex;
            gap: 4px;
        }

        /* Emoji Buttons */
        #emoji-bar button {
            border: none;
            background: #e2e8f0;
            border-radius: 5px;
            cursor: pointer;
            padding: 4px;
        }

        /* Emoji row BELOW input */
        #emoji-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        #emoji-row button {
            background: #1e293b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* File row */
        #file-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }


        /* File Upload */
        #file-upload {
            margin-top: 6px;
            display: flex;
            gap: 5px;
        }


        /*.controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
        }*/

        /* CONTROLS RIGHT (VERTICAL) */
        .controls-vertical {
            width: 150px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
            max-height:65vh;
            overflow-y:auto;
        }

        /* BUTTON STYLE */
        .controls-vertical button {
            width: 100%;
            padding: 10px;
        }

        button {
            margin:5px;
            padding:8px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .side { flex:1; display:flex; flex-direction:column; }

        .chat { flex:1; overflow:auto; padding:10px; }

        .participants {
            padding: 5px;
            background: #fde68a;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        /* PARTICIPANTS = 30% */
        #participants-section {
            height: 30%;
            background: #f3f4f6;
            border-radius: 10px;
            padding: 10px;
        }

        /* Participants BELOW chat */
        #participants-panel {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        #participants-panel h4 {
            margin-bottom: 6px;
            color: #b45309;
        }

        .screen-share {
            width: 100%;
            height: 100%;
            background: black;
        }

        .hand-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            background: yellow;
            color: black;
            padding: 4px;
            border-radius: 50%;
            font-size: 14px;
        }

        .reaction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            font-size: 32px;
            animation: floatAdvanced 4s ease-out forwards;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-80px) scale(1.1);
            }
            60% {
                transform: translateY(-160px) scale(1.05);
            }
            100% {
                opacity: 0;
                transform: translateY(-260px) scale(0.95);
            }
        }

        /* 🔥 ADVANCED FLOAT (smooth + drift + scale) */
        @keyframes floatAdvanced {
            0% {
                opacity: 0;
                transform: translate(-50%, 0) scale(0.8);
            }
            10% {
                opacity: 1;
                transform: translate(-50%, -40px) scale(1.1);
            }
            40% {
                transform: translate(calc(-50% + 20px), -140px) scale(1.05);
            }
            70% {
                transform: translate(calc(-50% - 20px), -240px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -320px) scale(0.9);
            }
        }

        .video-box.spotlight {
            border: 3px solid #facc15;
            box-shadow: 0 0 15px #facc15;
        }

        .player {
            width: 100%;
            height: 100%;
        }

        .camera-off .player{
            display:none;
        }

        .camera-off::after{
            content:"Camera Off";
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            color:white;
            font-size:16px;
        }


        #live-layout{

            display:flex;

            flex-direction:column;

            gap:12px;

            width:100%;

            height:100%;
        }

        #main-stage{

            width:100%;

            height:70vh;

            background:black;

            border-radius:16px;

            overflow:hidden;

            position:relative;
        }

        #video-grid{

            display:grid;

            grid-template-columns:
                repeat(auto-fill,minmax(220px,1fr));

            gap:10px;

            min-height:160px;
        }

        .video-tile{

            position:relative;

            width:100%;

            height:100%;

            background:black;

            border-radius:12px;

            overflow:hidden;
        }

        .main-tile{

            width:100%;

            height:70vh;

            position:relative;

            overflow:hidden;

            border-radius:16px;

            background:black;
        }

        .grid-tile{

            height:180px;
        }

        .video-player{

            width:100%;

            height:100%;

            min-height:300px;

            background:black;
        }

        .video-info{

            position:absolute;

            bottom:10px;

            left:10px;

            color:white;

            background:rgba(0,0,0,0.5);

            padding:4px 10px;

            border-radius:8px;

            font-size:14px;
        }

        .screen-player{

            width:100%;

            height:100%;
        }
        
    </style>


<div class="container">

    <!-- LEFT SIDE: VIDEO -->
    <div class="video-section">

        <div class="video-top">

            <div class="controls-vertical">
                <button id="join-btn">Join</button>

                <button id="share-btn">Share</button>
            </div>

            <!--
             <div id="main-video">
                <div id="main-slot"></div>
            </div> */
            
        </div>

        <div id="side-videos"></div> -->

        <div id="live-layout">

            <div id="main-stage"></div>

            <div id="video-grid"></div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

                    <div id="file-bar">

            </div>-->

            <!-- PARTICIPANTS (30%) -->
            <!--<div id="participants-section">
                <h4>Participants</h4>
                <div id="participants-list"></div>
            </div>-->

        </div>
    </div>

</div>









<script type="module">

import {
    initRTC,
    joinRoom,
    startScreenShare

} from "/static/js/liveclass/rtc.js?v=2";

const APP_ID =
    "68983e3ac34747498d839a7e4c83a9c5";

const CHANNEL =
    "test-room";

const USERNAME =
    "{{ request.user.username }}";

// INIT RTC
await initRTC(APP_ID);

// JOIN BUTTON
document
    .getElementById("join-btn")
    .addEventListener("click", async () => {

        let uid =
            String(Date.now());

        await joinRoom({

            appId: APP_ID,

            channel: CHANNEL,

            token: null,

            uid: uid,

            username: USERNAME
        });
    });

// SHARE BUTTON
document
    .getElementById("share-btn")
    .addEventListener("click", async () => {

        await startScreenShare();
    });

</script>

{% endblock %}
