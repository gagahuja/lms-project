{% extends 'base.html' %}

{% block content %}

<style>
.video-container {
    display: flex;
    gap: 20px;
}

.video-box {
    width: 45%;
    height: 300px;
    background: black;
    border-radius: 12px;
}

.controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

.controls button {
    margin: 5px;
    padding: 10px 15px;
    border-radius: 8px;
}

.main-video {
    position: relative;
    width: 100%;
    height: 70vh;
    background: black;
    border-radius: 12px;
    overflow: hidden;
}

.big-video {
    width: 100%;
    height: 100%;
}

.small-video {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border-radius: 10px;
    border: 2px solid white;
}

.chat-box {
    position: fixed;
    right: 10px;
    top: 100px;
    width: 300px;
    height: 400px;
    background: white;
    overflow-y: scroll;
    padding: 10px;
    border-radius: 10px;
}

.teacher-panel {
    position: fixed;
    left: 20px;
    bottom: 20px;
    background: #111;
    color: white;
    padding: 15px;
    border-radius: 10px;
}
</style>

{% if request.user.user_type == "teacher" %}
<div class="teacher-panel">
    <h5>Teacher Controls</h5>

    <button onclick="muteAll()">🔇 Mute All</button>
    <button onclick="endClass()">❌ End Class</button>
</div>
{% endif %}

<h3>🎥 Live Class (Agora)</h3>

<div class="main-video">
    <div id="remote-player" class="big-video"></div>

    <div id="local-player" class="small-video"></div>
</div>

<div class="chat-box">
    <div id="chat-messages"></div>

    <input type="text" id="chat-input" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<div class="controls">
    <button onclick="joinCall()">🟢 Join</button>
    <button onclick="toggleMic()">🎤</button>
    <button onclick="toggleCamera()">📷</button>
    <button onclick="shareScreen()">🖥</button>
</div>


<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<script>
const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";  // 🔴 PUT YOUR APP ID HERE
const CHANNEL = "{{ class_id }}";

let client;
let localTracks = [];

async function joinCall() {
    client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    await client.join(APP_ID, CHANNEL, null, null);

    // 🎤 Mic + Camera
    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    // Show local video
    localTracks[1].play("local-player");

    // Publish
    await client.publish(localTracks);

    // Receive remote users
    client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);

        if (mediaType === "video") {
            const remoteContainer = document.createElement("div");
            remoteContainer.id = user.uid;
            remoteContainer.style.width = "300px";
            remoteContainer.style.height = "200px";
            document.getElementById("remote-player").appendChild(remoteContainer);

            user.videoTrack.play(remoteContainer);
        }

        if (mediaType === "audio") {
            user.audioTrack.play();
        }
    });
}

async function shareScreen() {
    const screenTrack = await AgoraRTC.createScreenVideoTrack();

    await client.unpublish(localTracks);

    await client.publish(screenTrack);

    screenTrack.play("local-player");
}

function raiseHand() {
    alert("Hand Raised 🙋‍♂️");
}

function sendMessage() {
    let text = document.getElementById("chat-input").value;

    fetch(`/send-message/${CLASS_ID}/`, {
        method: "POST",
        headers: {"X-CSRFToken": csrftoken},
        body: new URLSearchParams({text: text})
    });
}

function loadMessages() {
    fetch(`/get-messages/${CLASS_ID}/`)
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chat-messages");
        box.innerHTML = "";

        data.messages.forEach(m => {
            box.innerHTML += `<p><b>${m.user}</b>: ${m.text}</p>`;
        });
    });
}

setInterval(loadMessages, 2000);

let micMuted = false;
async function toggleMic() {
    if (micMuted) {
        await localTracks[0].setEnabled(true);
        micMuted = false;
    } else {
        await localTracks[0].setEnabled(false);
        micMuted = true;
    }
}

let camOff = false;
async function toggleCamera() {
    if (camOff) {
        await localTracks[1].setEnabled(true);
        camOff = false;
    } else {
        await localTracks[1].setEnabled(false);
        camOff = true;
    }
}

function muteAll() {
    alert("All students muted (demo)");
}

function endClass() {
    window.location.href = "/dashboard/";
}
</script>

{% endblock %}
