{% extends 'base.html' %}

{% block content %}


    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            overflow:hidden;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            margin-left: 220px;
            padding: 10px;
            gap: 15px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            overflow: hidden;
            width: 100%;
            max-width: 100%;
            padding: 10px;
            margin: 0;
        }

        .player video{
            width:100% !important;
            height:100% !important;
            object-fit:cover;
        }

        /* VIDEO */
        .video-section {
            flex: 1;
            display:flex;
            flex-direction:column;
            height:100vh;
            overflow:hidden;
        }

        
        /* VIDEO BOX */
        .video-box {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .video-name{
            position:absolute;
            bottom:8px;
            left:8px;
            background:rgba(0,0,0,0.5);
            color:white;
            padding:4px 8px;
            border-radius:5px;
            font-size:13px;
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* MAIN VIDEO SIZE */
        .main-video .video-box {
            width: 100%;
            height: 100%;
            transform: scale(1);
        }



        /* ACTIVE SPEAKER */
        .active-speaker {
            border: 3px solid #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }


        .video-label {
            position: absolute;

            left: 8px;
            background: rgba(0,0,0,0.6);

            border-radius: 8px;
            font-size: 15px;
            color: white;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .video-label span {
            color: white;           /* ensure all text white */
            font-weight: 600;
        }

        .video-box.pinned {
            border: 3px solid gold;
        }

        .video-box.active-speaker {
            border: 3px solid #22c55e;
        }

        .user-name {
            font-weight: 500;
        }

        .video-overlay{
            position:absolute;
            bottom:6px;
            left:6px;
            right:6px;
            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:4px 8px;
            border-radius:6px;
            color:white;
            font-size:13px;

        .mic-icon {
            font-size: 16px;
        }

        .video-top {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: stretch;
        }
        
        #main-video {
            flex: 1;
            height: 65vh;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
        }

        #main-slot{
            width:100%;
            height:100%;
        }

        #main-slot .video-box{
            width:100%;
            height:100%;

        /* SIDE VIDEOS */
        #side-videos{
            width:100%;
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(180px,1fr));

            padding:10px;

            border-radius: 10px;
            overflow: hidden;
        }

        /* Optional hover effect */
        .side-videos .video-box:hover {
            transform: scale(1.05);
        }
        

        /* Chat Container */
        #chat-container {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        /* CHAT PANEL */
        #right-panel {

            gap: 5px;
        }

            flex: 1;

            display: flex;
            align-items: center;

        #emoji-bar {

        #emoji-bar button {

        #emoji-row {

        #emoji-row button {
            background: #1e293b;

        }

        .reaction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            font-size: 32px;
            animation: floatAdvanced 4s ease-out forwards;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-80px) scale(1.1);
            }
            60% {
                transform: translateY(-160px) scale(1.05);
            }
            100% {
                opacity: 0;
                transform: translateY(-260px) scale(0.95);
            }
        }

        /* 🔥 ADVANCED FLOAT (smooth + drift + scale) */
        @keyframes floatAdvanced {
            0% {
                opacity: 0;
                transform: translate(-50%, 0) scale(0.8);
            }
            10% {
                opacity: 1;
                transform: translate(-50%, -40px) scale(1.1);
            }
            40% {
                transform: translate(calc(-50% + 20px), -140px) scale(1.05);
            }
            70% {
                transform: translate(calc(-50% - 20px), -240px) scale(1);
            }
            100% {

        .video-tile{

        .main-tile{

    </style>

function connectSocket(retry = 0){

    console.log("Connecting WS to room:", roomName);

        // 🔥 RETRY LOGIC (VERY IMPORTANT)

// JOIN
async function join(){

    UID = String(Date.now());  // stable unique id
    client.uid = UID;

    await client.join(APP_ID, CHANNEL, null, UID);

    userMap[UID] = "{{ request.user.username }}";

    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    if(!document.getElementById("video-" + UID)){
        let box = createVideoBox(UID, "{{ request.user.username }}");
        document.getElementById("main-slot").appendChild(box);
    }

    // play video
    localTracks[1].play("player-" + UID);

    // store correct name
    userMap[UID] = "{{ request.user.username }}";
    users[UID] = "{{ request.user.username }}";

    updateParticipants();

    // set active speaker
    state.activeUser = UID;

    // THEN layout decides main
    renderLayout()

    await client.publish(localTracks);

    
    socket.send(JSON.stringify({
        type: "user_join",
        uid: UID,
        username: "{{ request.user.username }}"
    }));
}


// REMOTE
client.on("user-published", async (user, mediaType) => {

    await client.subscribe(user, mediaType);

    let uid = String(user.uid);

    let name = userMap[uid] || "User";

    // CREATE VIDEO BOX
    let box = document.getElementById("video-" + uid);

    if(!box){

        box = createVideoBox(uid, name);

        document
            .getElementById("side-videos")
            .appendChild(box);
    }

    // VIDEO
    if(mediaType === "video"){

        user.videoTrack.play("player-" + uid);

        // SCREEN SHARE
        if(uid.includes("_screen")){

            state.isScreenSharing = true;

            state.screenUser = uid;

        } else {

            if(!state.activeUser){
                state.activeUser = uid;
            }
        }
    }

    // AUDIO
    if(mediaType === "audio"){

        user.audioTrack.play();
    }

    // PARTICIPANTS
    if(!uid.includes("_screen")){

        users[uid] = name;

        updateParticipants();
    }

    // FINAL RENDER
    renderLayout();
});

// VIDEO BOX
function createVideoBox(uid, name){

    // already exists
    let existing = document.getElementById("video-" + uid);

    if(existing) return existing;

    let div = document.createElement("div");

    div.className = "video-box";

    div.id = "video-" + uid;

    div.innerHTML = `
        <div id="player-${uid}" class="player"></div>

        <div class="video-name">
            ${name}
        </div>
    `;

    return div;
}

function renderLayout(){

    let mainSlot =
        document.getElementById("main-slot");

    let sideVideos =
        document.getElementById("side-videos");

    // DETERMINE MAIN USER
    let targetUid = null;

    // 1 SCREEN SHARE
    if(
        state.isScreenSharing &&
        state.screenUser
    ){

        targetUid = state.screenUser;

    // 2 SPOTLIGHT
    } else if(spotlightUser){

        targetUid = spotlightUser;

    // 3 PINNED
    } else if(state.pinnedUser){

        targetUid = state.pinnedUser;

    // 4 ACTIVE SPEAKER
    } else if(state.activeUser){

        targetUid = state.activeUser;
    }

    // FALLBACK
    if(!targetUid){

        let first =
            document.querySelector(".video-box");

        if(first){
            targetUid =
                first.id.replace("video-", "");
        }
    }

    if(!targetUid) return;

    let targetBox =
        document.getElementById(
            "video-" + targetUid
        );

    if(!targetBox) return;

    // MOVE ALL TO GRID FIRST
    document
        .querySelectorAll(".video-box")
        .forEach(box => {

            if(box !== targetBox){

                sideVideos.appendChild(box);
            }
        });

    // CLEAR MAIN
    mainSlot.innerHTML = "";

    // MOVE TARGET TO MAIN
    mainSlot.appendChild(targetBox);
}

// CHAT
function sendMessage(){
    let input = document.getElementById("chat-message-input");
    let fileInput = document.getElementById("fileInput");

    let message = input.value.trim();
    let file = fileInput.files[0];

    if(!socket || socket.readyState !== 1){
        alert("Chat not connected");
        return;
    }

    // 📎 FILE PRIORITY
    if(file){
        let formData = new FormData();
        formData.append("file", file);

        fetch("/upload/", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.url){
                socket.send(JSON.stringify({
                    type: "chat",
                    message: `📎 FILE:${data.url}|${data.name}`
                }));
            }
        });

        fileInput.value = "";
    }

    // 💬 TEXT / EMOJI
    if(message){
        socket.send(JSON.stringify({
            type: "chat",
            message: message
        }));

        input.value = "";
    }
}

function addMessage(user, msg){
    let box = document.getElementById("chat-box");

    let div = document.createElement("div");
    div.className = "chat-msg";

    let name = document.createElement("span");
    name.className = "chat-user";
    name.innerText = user + ": ";

    let content = document.createElement("span");

    if(msg.startsWith("📎 FILE:")){
        let parts = msg.replace("📎 FILE:", "").split("|");
        let url = parts[0];
        let fname = parts[1];

        let link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.innerText = "📎 " + fname;
        link.style.color = "#4ade80";

        content.appendChild(link);
    } else {
        content.innerText = msg;
    }

    div.appendChild(name);
    div.appendChild(content);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}


// PARTICIPANTS
function updateParticipants(){

    let list = document.getElementById("participants-list");
    list.innerHTML = "";

    Object.keys(users).forEach(uid => {

        let div = document.createElement("div");
        div.className = "participants";
        div.innerText = users[uid];

        list.appendChild(div);
    });
}

async function shareScreen(){

    // STOP SHARE
    if(state.isScreenSharing){
        stopScreenShare();
        return;
    }

    // CREATE TRACK
    screenTrack = await AgoraRTC.createScreenVideoTrack();

    // SCREEN UID
    screenUid = String(UID) + "_screen";

    // JOIN SCREEN CLIENT
    await screenClient.join(
        APP_ID,
        CHANNEL,
        null,
        screenUid
    );

    // PUBLISH SCREEN
    await screenClient.publish([screenTrack]);

    // STATE
    state.isScreenSharing = true;
    state.screenUser = screenUid;

    // CREATE BOX
    let box = createVideoBox(screenUid, "Screen");

    // ADD TO DOM
    document
        .getElementById("side-videos")
        .appendChild(box);

    // PLAY
    screenTrack.play("player-" + screenUid);

    // RENDER
    renderLayout();

    // AUTO STOP
    screenTrack.on("track-ended", async () => {
        await stopScreenShare();
    });
}

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("/upload/", {
        method: "POST",

let lastSpeaker = null;
lastSwitchTime = 0;

client.enableAudioVolumeIndicator();

client.on("volume-indicator", volumes => {

    // NEVER switch during screen share
    if(state.isScreenSharing) return;

    let loudestUser = null;
    let highestLevel = 0;

    volumes.forEach(v => {

        if(v.level > highestLevel){

            highestLevel = v.level;

            let candidate = String(v.uid);

            if(candidate.includes("_screen")) return;

            loudestUser = candidate;
        }
    });

    // ignore weak sounds
    if(highestLevel < 12) return;

    let now = Date.now();

    // prevent rapid switching
    if(now - lastSwitchTime < 500) return;

    // same speaker
    if(lastSpeaker === loudestUser) return;

    lastSpeaker = loudestUser;

    lastSwitchTime = now;

    state.activeUser = loudestUser;

    renderLayout()
});

client.on("user-left", user => {

    delete users[user.uid];
    delete userMap[user.uid];

    let el = document.getElementById("video-" + user.uid);
    if(el) el.remove();

    updateParticipants();

    if(String(user.uid).includes("_screen")){

        // REMOVE SCREEN BOX
        let screenBox =
            document.getElementById("video-" + user.uid);

        if(screenBox){
            screenBox.remove();
        }

        // CLEAR MAIN SLOT
        document.getElementById("main-slot").innerHTML = "";

        // RESET STATE
        state.isScreenSharing = false;

        state.screenUser = null;

        // FIND REAL USER
        let fallbackUser = null;

        let firstRealUser =
            document.querySelector(
                '.video-box:not([id*="_screen"])'
            );

        if(firstRealUser){

            fallbackUser =
                firstRealUser.id.replace("video-", "");
        }

        if(fallbackUser){
            state.activeUser = fallbackUser;
        }

        setTimeout(() => {

            renderLayout()

        }, 100);
    }
});

async function stopScreenShare(){

    if(!screenTrack) return;

    await screenClient.unpublish(screenTrack);

    screenTrack.close();

    // REMOVE SCREEN BOX

            "video-" + state.screenUser

    state.screenUser = null;

    screenTrack = null;

    // RESTORE ACTIVE USER
    state.activeUser = UID;

    renderLayout();
