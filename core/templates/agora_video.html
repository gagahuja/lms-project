{% extends 'base.html' %}

{% block content %}


    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 80px); /* adjust for header */
            width: 100%;
        }

        /* VIDEO */
        .video-section {
            flex: 1;  /* 🔥 MORE SPACE */
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
            height: 100%;
        }

        .video-area {
            flex:4;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:10px;
            padding:10px;
        }

        /* VIDEO BOX */
        .video-box {
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 600px;
            background: black;
            border-radius: 12px;
            overflow: hidden;
        }

        /* MAIN VIDEO SIZE */
        .main-video .video-box {
            width: 90%;
            height: 90%;
        }



        /* ACTIVE SPEAKER */
        .active-speaker {
            border: 3px solid #22c55e; /* green */
        }

        .video-label {
            position:absolute;
            bottom:5px;
            left:5px;
            background:rgba(0,0,0,0.6);
            padding:3px 6px;
            font-size:12px;
        }

        .video-layout {
            display: flex;
            height: 100%;
        }

        /* MAIN VIDEO */
        .main-video {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SIDE VIDEOS */
        .side-videos {
            height: 120px;
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
        }

        /* SIDE VIDEO SIZE */
        .side-videos .video-box {
            width: 150px;
            height: 100px;
        }

        /* CHAT PANEL */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111827;
            border-left: 1px solid #333;
        }

        /* CHAT SECTION */
        .chat-section {
            width: 300px;        /* fixed width */
            min-width: 250px;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            background: #111827;
        }

        /* CHAT BOX */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* INPUT */
        .chat-input-area {
            display: flex;
            padding: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 8px;
        }

        .chat-input-area button {
            margin-left: 5px;
        }

        /* FILE */
        .file-upload {
            padding: 10px;
        }


        .controls {
            position:fixed;
            bottom:15px;
            left:50%;
            transform:translateX(-50%);
        }

        button {
            margin:5px;
            padding:8px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .side { flex:1; display:flex; flex-direction:column; }

        .chat { flex:1; overflow:auto; padding:10px; }

        .participants {
            height: 120px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding: 10px;
            font-size: 14px;
        }

    </style>


<div class="main">

    <div class="main-container">

        <!-- VIDEO AREA -->
        <div class="video-section">

            <div id="main-video" class="main-video"></div>

            <div id="side-videos" class="side-videos"></div>

        </div>

        <!-- CHAT -->
        <div class="chat-section">
            <div id="chat-box" class="chat-box"></div>

            <div class="chat-input-area">
                <input id="chat-input" placeholder="Type message..." />
                <button onclick="sendMessage()">Send</button>
            </div>

            <div class="file-upload">
                <input type="file" id="fileInput">
                <button onclick="uploadFile()">📎</button>
            </div>
            <div id="participants" class="participants"></div>
        </div>

</div>

<div class="controls">
    <button onclick="join()">Join</button>
    <button onclick="toggleMic()">Mic</button>
    <button onclick="toggleCam()">Cam</button>
    <button onclick="setGrid()">Grid</button>
    <button onclick="setSpotlight()">Spotlight</button>
    <button onclick="shareScreen()">Share</button>

    {% if request.user.is_staff %}
    <button onclick="muteAll()">Mute All</button>
    <button onclick="endClass()">End</button>
    {% endif %}

    <button onclick="leave()">Leave</button>
</div>

<script>

const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";
const CHANNEL = "class_{{ live_class.id }}";

let client = AgoraRTC.createClient({mode:"rtc", codec:"vp8"});
let localTracks = [];

let userMap = {};
let isTeacher = "{{ request.user.is_staff }}" === "True";
let users = {};
let activeUser = null;

// SOCKET
let wsScheme = window.location.protocol === "https:" ? "wss" : "ws";

// 🔥 FORCE from URL instead of template
let roomName = window.location.pathname.split("/").filter(Boolean).pop();

console.log("ROOM FIXED:", roomName);

let socket = new WebSocket(
    wsScheme + "://" + window.location.host + "/ws/chat/" + roomName + "/"
);

socket.onopen = () => console.log("✅ WebSocket CONNECTED");
socket.onerror = (e) => console.log("❌ ERROR", e);
socket.onclose = () => console.log("❌ CLOSED");

socket.onmessage = e => {
    console.log("RECEIVED:", e.data);
    let data = JSON.parse(e.data);


    if(data.type==="chat"){
        let user = data.user;

        // mark own messages
        if(user === "{{ request.user.username }}"){
            user = "You";
        }

        addMessage(user, data.message);
    }

    if(data.type==="kick"){
        if(String(client.uid)===String(data.target)){
            alert("Kicked by teacher");
            leave();
        }
    }

    if(data.type==="mute_all"){
        if(localTracks[0]) localTracks[0].setEnabled(false);
    }

    if(data.type==="end_class"){
        alert("Class Ended");
        leave();
    }
};

// JOIN
async function join(){

    let UID = Math.floor(Math.random()*10000);
    client.uid = UID;

    await client.join(APP_ID, CHANNEL, null, UID);

    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    let box = createVideoBox(UID, "{{ request.user.username }}");

    document.getElementById("main-video").appendChild(box);

    localTracks[1].play("user-" + UID);

    users[UID] = "{{ request.user.username }}";  // ✅ FIX
    updateParticipants();

    activeUser = UID;

    await client.publish(localTracks);
}




// REMOTE
client.on("user-published", async(user, mediaType)=>{

    await client.subscribe(user, mediaType);

    if(mediaType === "video"){

        let box = createVideoBox(user.uid, "User");

        document.getElementById("side-videos").appendChild(box);

        user.videoTrack.play("user-" + user.uid);

        users[user.uid] = "User";
        updateParticipants();
    }

    if(mediaType === "audio"){
        user.audioTrack.play();
    }
});

// VIDEO BOX
function createVideoBox(uid, name){

    let box = document.createElement("div");
    box.className = "video-box";
    box.id = "user-" + uid;

    let label = document.createElement("div");
    label.className = "video-label";
    label.innerText = name + " 🎤";

    box.appendChild(label);

    return box;
}

// CHAT
function sendMessage(){

    let msg = document.getElementById("chat-input").value;

    console.log("Sending:", msg);

    if(!socket || socket.readyState !== 1){
        console.error("WebSocket NOT CONNECTED");
        return;
    }

    socket.send(JSON.stringify({
        type: "chat",
        message: msg
    }));

    document.getElementById("chat-input").value = "";
}

function addMessage(user, msg){
    let box = document.getElementById("chat-box");

    let div = document.createElement("div");

    let name = document.createElement("b");
    name.innerText = user + ": ";

    let content = document.createElement("span");

    // ✅ detect file message
    if(msg.startsWith("📎 FILE:")){
        let parts = msg.replace("📎 FILE:", "").split("|");
        let url = parts[0];
        let fname = parts[1];

        let link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.innerText = "📎 " + fname;

        content.appendChild(link);
    } else {
        content.innerText = msg;
    }

    div.appendChild(name);
    div.appendChild(content);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// PARTICIPANTS
function updateParticipants(){
    let div = document.getElementById("participants");

    if(!div) return;

    div.innerHTML = "";

    Object.keys(users).forEach(uid => {

        let item = document.createElement("div");

        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.style.marginBottom = "5px";

        item.innerHTML = `
            <span>${users[uid]}</span>
            ${isTeacher ? `<button onclick="kick(${uid})">❌</button>` : ""}
        `;

        div.appendChild(item);
    });
}

// CONTROLS
function toggleMic(){
    if(localTracks[0]){
        let enabled = !localTracks[0].enabled;
        localTracks[0].setEnabled(enabled);

        let label = document.querySelector("#user-" + client.uid + " .video-label");
        if(label){
            label.innerText = "{{ request.user.username }}" + (enabled ? " 🎤" : " 🔇");
        }
    }
}

function toggleCam(){
    if(localTracks[1]) localTracks[1].setEnabled(!localTracks[1].enabled);
}

function shareScreen(){
    alert("Screen share basic version active");
}

function muteAll(){
    socket.send(JSON.stringify({type:"mute_all"}));
}

function endClass(){
    socket.send(JSON.stringify({type:"end_class"}));
}

function kick(uid){
    socket.send(JSON.stringify({type:"kick", target:uid}));
}

function leave(){
    location.reload();
}


async function uploadFile(){
    let fileInput = document.getElementById("fileInput");

    if(!fileInput.files.length){
        alert("Select a file first");
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try{
        let res = await fetch(window.location.origin + "/upload-file/", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if(data.error){
            alert(data.error);
            return;
        }

        socket.send(JSON.stringify({
            type:"chat",
            message:`📎 FILE:${data.url}|${data.name}`
        }));

    }catch(err){
        alert("Upload failed");
        console.error(err);
    }
}


// ENTER key to send message
document.getElementById("chat-input").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        e.preventDefault(); // prevents newline / form issues
        sendMessage();
    }
});


document.addEventListener("click", function(e){
    let box = e.target.closest(".video-box");
    if(!box) return;

    let uid = box.id.replace("user-", "");

    setMainVideo(uid);
});


function setMainVideo(uid){

    if(activeUser == uid) return; // 🔥 IMPORTANT

    let main = document.getElementById("main-video");
    let selected = users[uid];

    if(!selected) return;

    document.querySelectorAll(".video-box")
        .forEach(b => b.classList.remove("active-speaker"));

    selected.classList.add("active-speaker");

    main.innerHTML = "";
    main.appendChild(selected);

    activeUser = uid;
}


client.enableAudioVolumeIndicator();

let lastSwitch = 0;

client.on("volume-indicator", volumes => {
    volumes.forEach(v => {

        if(v.level > 5){
            let now = Date.now();

            if(now - lastSwitch > 2000){ // 🔥 2 sec delay
                setMainVideo(v.uid);
                lastSwitch = now;
            }
        }

    });
});


function setGrid(){
    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    side.innerHTML = "";

    Object.values(users).forEach(box=>{
        main.appendChild(box);
    });
}

function setSpotlight(){
    // restore layout
    location.reload();
}

client.on("user-left", user => {

    delete users[user.uid];

    let el = document.getElementById("user-" + user.uid);
    if(el) el.remove();

    updateParticipants();
});

</script>

{% endblock %}
