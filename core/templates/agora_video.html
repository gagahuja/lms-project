{% extends 'base.html' %}

{% block content %}


    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        /* VIDEO */
        .video-section {
            flex: 3;
            padding: 10px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
            height: 100%;
        }

        .video-area {
            flex:4;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:10px;
            padding:10px;
        }

        .video-box {
            position: relative;
            background: black;
            width: 100%;
            height: 300px;  /* 🔥 THIS IS THE FIX */
            border-radius: 10px;
            overflow: hidden;
        }

        .video-label {
            position:absolute;
            bottom:5px;
            left:5px;
            background:rgba(0,0,0,0.6);
            padding:3px 6px;
            font-size:12px;
        }

        /* CHAT PANEL */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111827;
            border-left: 1px solid #333;
        }

        /* CHAT BOX */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* INPUT */
        .chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #333;
        }

        .chat-input-area input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        .chat-input-area button {
            margin-left: 5px;
        }

        /* FILE */
        .file-upload {
            padding: 10px;
            border-top: 1px solid #333;
        }


        .controls {
            position:fixed;
            bottom:15px;
            left:50%;
            transform:translateX(-50%);
        }

        button {
            margin:5px;
            padding:8px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .side { flex:1; display:flex; flex-direction:column; }

        .chat { flex:1; overflow:auto; padding:10px; }
        .participants { flex:1; overflow:auto; padding:10px; border-top:1px solid #444; }

    </style>


<div class="main">

    <div class="main">

    <!-- VIDEO AREA -->
    <div class="video-section">
        <div id="video-container" class="video-grid"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- CHAT -->
        <div id="chat-box" class="chat-box"></div>

        <!-- INPUT -->
        <div class="chat-input-area">
            <input id="chat-input" placeholder="Type message..." />
            <button onclick="sendMessage()">Send</button>
        </div>

        <!-- FILE -->
        <div class="file-upload">
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">📎 Upload</button>
        </div>

    </div>

</div>

<div class="controls">
    <button onclick="join()">Join</button>
    <button onclick="toggleMic()">Mic</button>
    <button onclick="toggleCam()">Cam</button>
    <button onclick="shareScreen()">Share</button>

    {% if request.user.is_staff %}
    <button onclick="muteAll()">Mute All</button>
    <button onclick="endClass()">End</button>
    {% endif %}

    <button onclick="leave()">Leave</button>
</div>

<script>

const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";
const CHANNEL = "class_{{ live_class.id }}";

let client = AgoraRTC.createClient({mode:"rtc", codec:"vp8"});
let localTracks = [];
let socket;
let userMap = {};
let isTeacher = "{{ request.user.is_staff }}" === "True";

// SOCKET
let wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
socket = new WebSocket(
    wsScheme + "://" + window.location.host + "/ws/chat/{{ live_class.id }}/"
);

socket.onmessage = e => {
    let data = JSON.parse(e.data);


    if(data.type==="chat"){
        let user = data.user;

        // mark own messages
        if(user === "{{ request.user.username }}"){
            user = "You";
        }

        addMessage(user, data.message);
    }

    if(data.type==="kick"){
        if(String(client.uid)===String(data.target)){
            alert("Kicked by teacher");
            leave();
        }
    }

    if(data.type==="mute_all"){
        if(localTracks[0]) localTracks[0].setEnabled(false);
    }

    if(data.type==="end_class"){
        alert("Class Ended");
        leave();
    }
};

// JOIN
async function join(){
    let UID = Math.floor(Math.random()*10000);
    client.uid = UID;

    await client.join(APP_ID, CHANNEL, null, UID);

    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    let box = createVideoBox(UID, "{{ request.user.username }}");
    localTracks[1].play("user-" + UID);

    await client.publish(localTracks);

    updateParticipants();
}

// REMOTE
client.on("user-published", async(user, mediaType)=>{
    await client.subscribe(user, mediaType);

    let box = createVideoBox(user.uid, "User");

    if(mediaType==="video"){
        user.videoTrack.play(box);
    }
    if(mediaType==="audio"){
        user.audioTrack.play();
    }

    updateParticipants();
});

// VIDEO BOX
function createVideoBox(uid, name){
    let box = document.createElement("div");
    box.className = "video-box";
    box.id = "user-" + uid;

    let label = document.createElement("div");
    label.className = "video-label";
    label.innerText = name;

    box.appendChild(label);

    document.getElementById("video-container").appendChild(box);

    return box.id; // 🔥 IMPORTANT: return ID not element
}

// CHAT
function sendMessage(){
    let input = document.getElementById("chat-input");
    let msg = input.value.trim();

    if(!msg) return; // prevent empty

    socket.send(JSON.stringify({
        type:"chat",
        message:msg
    }));

    input.value = "";
}

function addMessage(user, msg){
    let box = document.getElementById("chat-box");

    let div = document.createElement("div");

    let name = document.createElement("b");
    name.innerText = user + ": ";

    let content = document.createElement("span");

    // ✅ detect file message
    if(msg.startsWith("📎 FILE:")){
        let parts = msg.replace("📎 FILE:", "").split("|");
        let url = parts[0];
        let fname = parts[1];

        let link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.innerText = "📎 " + fname;

        content.appendChild(link);
    } else {
        content.innerText = msg;
    }

    div.appendChild(name);
    div.appendChild(content);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// PARTICIPANTS
function updateParticipants(){
    let div=document.getElementById("participants");
    div.innerHTML="";

    client.remoteUsers.forEach(u=>{
        div.innerHTML+=`
            <div>
                User ${u.uid}
                ${isTeacher ? `<button onclick="kick(${u.uid})">❌</button>`:""}
            </div>
        `;
    });
}

// CONTROLS
function toggleMic(){
    if(localTracks[0]) localTracks[0].setEnabled(!localTracks[0].enabled);
}

function toggleCam(){
    if(localTracks[1]) localTracks[1].setEnabled(!localTracks[1].enabled);
}

function shareScreen(){
    alert("Screen share basic version active");
}

function muteAll(){
    socket.send(JSON.stringify({type:"mute_all"}));
}

function endClass(){
    socket.send(JSON.stringify({type:"end_class"}));
}

function kick(uid){
    socket.send(JSON.stringify({type:"kick", target:uid}));
}

function leave(){
    location.reload();
}


async function uploadFile(){
    let fileInput = document.getElementById("fileInput");

    if(!fileInput.files.length){
        alert("Select a file first");
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try{
        let res = await fetch(window.location.origin + "/upload-file/", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        if(data.error){
            alert(data.error);
            return;
        }

        socket.send(JSON.stringify({
            type:"chat",
            message:`📎 FILE:${data.url}|${data.name}`
        }));

    }catch(err){
        alert("Upload failed");
        console.error(err);
    }
}


// ENTER key to send message
document.getElementById("chat-input").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        e.preventDefault(); // prevents newline / form issues
        sendMessage();
    }
});

</script>

{% endblock %}
