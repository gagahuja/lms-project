{% extends 'base.html' %}

{% block content %}

<style>

.live-wrapper {
    display: flex;
    gap: 10px;
    width: 100%;
    padding: 10px 10px 10px 0;  /* NO LEFT PADDING */
}

/* VIDEO SECTION */
.video-section {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.video-container {
    position: relative;
    height: 75vh;
    background: black;
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
}

.remote-video {
    width: 100%;
    height: 100%;
}

.local-video {
    position: absolute;
    bottom: 15px;
    right: 15px;
    width: 200px;
    height: 140px;
    border-radius: 10px;
    border: 2px solid white;
}

/* CONTROLS */
.controls-bar {
    margin-top: 10px;
    text-align: center;
}

.controls-bar button {
    margin: 5px;
    padding: 8px 14px;
    border-radius: 8px;
}

/* TEACHER PANEL */
.teacher-panel {
    margin-top: 10px;
    text-align: center;
}

.teacher-panel button {
    margin: 5px;
}

/* RIGHT PANEL */
.right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 320px;
    width: 320px;
    flex-shrink: 0;
}

/* CHAT */
.chat-box {
    flex: 2;
    display: flex;
    flex-direction: column;
    background: #111;
    color: white;
    border-radius: 10px;
}

.chat-header {
    padding: 10px;
    background: #222;
    font-weight: bold;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.chat-input {
    display: flex;
    border-top: 1px solid #333;
}

.chat-input input {
    flex: 1;
    padding: 6px;
}

/* PARTICIPANTS */
.participants-box {
    flex: 1;
    background: #222;
    color: white;
    border-radius: 10px;
    padding: 10px;
    overflow-y: auto;
}
</style>



<div class="live-wrapper">

    <!-- VIDEO AREA -->
    <div class="video-section">

        <div class="video-container">
            <div id="remote-player" class="remote-video"></div>

            <div id="local-player" class="local-video"></div>
        </div>

        <!-- CONTROLS -->
        <div class="controls-bar">
            <button onclick="joinCall()">🟢 Join</button>
            <button onclick="toggleMic()">🎤</button>
            <button onclick="toggleCamera()">📷</button>
            <button onclick="shareScreen()">🖥</button>
            <button onclick="askAI()">🤖 Ask AI</button>
        </div>

        <!-- TEACHER PANEL -->
        {% if request.user.user_type == "teacher" %}
        <div class="teacher-panel">
            <button onclick="muteAll()">🔇 Mute All</button>
            <button onclick="endClass()">❌ End Class</button>
        </div>
        {% endif %}

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- CHAT -->
        <div class="chat-box">
            <div class="chat-header">💬 Chat</div>

            <div id="chat-messages" class="chat-messages"></div>

            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Type message...">
                <button onclick="sendMessage()">Send</button>
                <button onclick="startRecording()">🎤</button>
                <button onclick="addEmoji('😊')">😊</button>
                <button onclick="addEmoji('👍')">👍</button>
                <button onclick="addEmoji('🔥')">🔥</button>
                <input type="file" id="fileInput">
                <button onclick="sendFile()">📎</button>
            </div>
        </div>

        <!-- PARTICIPANTS -->
        <div class="participants-box">
            <div class="chat-header">👨‍🎓 Participants</div>
            <div id="participants-list"></div>
        </div>

    </div>

</div>




<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<script>
const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";  // 🔴 PUT YOUR APP ID HERE
const CHANNEL = "{{ class_id }}";

let client;
let localTracks = [];

async function joinCall() {
    client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    await client.join(APP_ID, CHANNEL, null, null);

    // 🎤 Mic + Camera
    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    // Show local video
    localTracks[1].play("local-player");

    // Publish
    await client.publish(localTracks);

    // Receive remote users
    client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);

        if (mediaType === "video") {
            const remoteContainer = document.createElement("div");
            remoteContainer.id = user.uid;
            remoteContainer.style.width = "300px";
            remoteContainer.style.height = "200px";
            document.getElementById("remote-player").appendChild(remoteContainer);

            user.videoTrack.play(remoteContainer);
        }

        if (mediaType === "audio") {
            user.audioTrack.play();
        }
    });
}

async function shareScreen() {
    const screenTrack = await AgoraRTC.createScreenVideoTrack();

    await client.unpublish(localTracks);

    await client.publish(screenTrack);

    screenTrack.play("local-player");
}

function raiseHand() {
    alert("Hand Raised 🙋‍♂️");
}

function sendMessage() {
    let text = document.getElementById("chat-input").value;

    fetch(`/send-message/${CLASS_ID}/`, {
        method: "POST",
        headers: {"X-CSRFToken": csrftoken},
        body: new URLSearchParams({text: text})
    });
}

function loadMessages() {
    fetch(`/get-messages/${CLASS_ID}/`)
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chat-messages");
        box.innerHTML = "";

        data.messages.forEach(m => {
            box.innerHTML += `<p><b>${m.user}</b>: ${m.text}</p>`;
        });
    });
}

setInterval(loadMessages, 2000);

let micMuted = false;
async function toggleMic() {
    if (micMuted) {
        await localTracks[0].setEnabled(true);
        micMuted = false;
    } else {
        await localTracks[0].setEnabled(false);
        micMuted = true;
    }
}

let camOff = false;
async function toggleCamera() {
    if (camOff) {
        await localTracks[1].setEnabled(true);
        camOff = false;
    } else {
        await localTracks[1].setEnabled(false);
        camOff = true;
    }
}

function muteAll() {
    alert("All students muted (demo)");
}

function endClass() {
    window.location.href = "/dashboard/";
}


let recorder;
let audioChunks = [];

async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    recorder = new MediaRecorder(stream);
    recorder.start();

    recorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };
}

function stopRecording() {
    recorder.stop();

    recorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });

        let audioURL = URL.createObjectURL(blob);

        document.getElementById("chat-messages").innerHTML +=
            `<audio controls src="${audioURL}"></audio>`;

        audioChunks = [];
    };
}

client.on("user-published", async (user, mediaType) => {

    await client.subscribe(user, mediaType);

    let div = document.getElementById("participants-list");

    div.innerHTML += `
        <p id="user-${user.uid}">
            ${user.uid}
            <button onclick="kickUser(${user.uid})">❌</button>
        </p>
    `;
});

function kickUser(uid) {
    let el = document.getElementById(`user-${uid}`);
    if (el) el.remove();

    alert("User removed (UI only)");
}

function addEmoji(emoji) {
    let input = document.getElementById("chat-input");
    input.value += emoji;
}

function sendFile() {
    let file = document.getElementById("fileInput").files[0];

    let reader = new FileReader();

    reader.onload = function(e) {
        document.getElementById("chat-messages").innerHTML +=
            `<a href="${e.target.result}" target="_blank">📎 File</a><br>`;
    };

    reader.readAsDataURL(file);
}

function askAI() {
    let question = prompt("Ask your doubt:");

    fetch("/ai-help/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrftoken
        },
        body: JSON.stringify({question: question})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chat-messages").innerHTML +=
            `<p><b>AI:</b> ${data.answer}</p>`;
    });
}
</script>

{% endblock %}
