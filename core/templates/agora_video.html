{% extends 'base.html' %}

{% block content %}

<style>

.live-container {
    display: flex;
    gap: 10px;
    margin-left: 260px; /* IMPORTANT: avoid sidebar overlap */
    padding: 10px;
}

.video-container {
    display: flex;
    gap: 20px;
}

.video-box {
    width: 45%;
    height: 300px;
    background: black;
    border-radius: 12px;
}

/* CONTROLS */
.controls {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
}

.controls button {
    margin: 5px;
    padding: 8px 12px;
}

.main {
    margin-left: 260px;
}

.main-video {
    position: relative;
    width: 100%;
    height: 70vh;
    background: black;
    border-radius: 12px;
    overflow: hidden;
}

.big-video {
    width: 100%;
    height: 100%;
}

.small-video {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border-radius: 10px;
    border: 2px solid white;
}

.chat-box {
    position: fixed;
    right: 10px;
    top: 100px;
    width: 300px;
    height: 400px;
    background: white;
    overflow-y: scroll;
    padding: 10px;
    border-radius: 10px;
}

.teacher-panel {
    position: absolute;
    top: 100px;
    left: 280px; /* sidebar width + spacing */
    background: #222;
    padding: 10px;
    border-radius: 10px;
    z-index: 9999; /* VERY IMPORTANT */
}

.layout {
    display: flex;
    gap: 10px;
}

.video-section {
    width: 75%;
    position: relative;
}

.chat-section {
    width: 25%;
    background: #111;
    color: white;
    height: 70vh;
    display: flex;
    flex-direction: column;
}

.chat-box {
    height: 60%;
    display: flex;
    flex-direction: column;
    background: #111;
    color: white;
    border-radius: 10px;
    overflow: hidden;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.chat-input {
    display: flex;
    border-top: 1px solid #333;
}

.chat-input input {
    flex: 1;
    padding: 5px;
}

.chat-input-box {
    display: flex;
}

.chat-input-box input {
    flex: 1;
}

/* PARTICIPANTS */
.participants {
    height: 40%;
    background: #222;
    color: white;
    padding: 10px;
    border-radius: 10px;
    overflow-y: auto;
}

/* VIDEO */
.video-area {
    flex: 1;
    position: relative;
    background: black;
    border-radius: 12px;
}

.remote-video {
    width: 100%;
    height: 100%;
}

.local-video {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border: 2px solid white;
    border-radius: 10px;
}

/* SIDE PANEL */
.side-panel {
    width: 320px;
    display: flex;
    flex-direction: column;
    height: 80vh;
    gap: 10px;
}
</style>



<h3>🎥 Live Class (Agora)</h3>

{% if request.user.user_type == "teacher" or request.user.is_superuser %}
<div class="teacher-panel">
    <button onclick="muteAll()">🔇 Mute All</button>
    <button onclick="endClass()">❌ End Class</button>
</div>
{% endif %}

<div class="live-container">

    <!-- VIDEO AREA -->
    <div class="video-area">

        <div id="remote-player" class="remote-video"></div>

        <div id="local-player" class="local-video"></div>

        <!-- CONTROLS -->
        <div class="controls">
            <button onclick="joinCall()">🟢 Join</button>
            <button onclick="toggleMic()">🎤</button>
            <button onclick="toggleCamera()">📷</button>
            <button onclick="shareScreen()">🖥</button>
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="side-panel">

        <!-- CHAT -->
        <div class="chat-box">
            <div id="chat-messages" class="chat-messages"></div>

            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Type message...">
                <button onclick="sendMessage()">Send</button>
                <button onclick="startRecording()">🎤</button>
                <button onclick="stopRecording()">⏹</button>
            </div>
        </div>

        <!-- PARTICIPANTS -->
        <div class="participants">
            <h6>Participants</h6>
            <div id="participants-list"></div>
        </div>

    </div>

</div>




<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<script>
const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";  // 🔴 PUT YOUR APP ID HERE
const CHANNEL = "{{ class_id }}";

let client;
let localTracks = [];

async function joinCall() {
    client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    await client.join(APP_ID, CHANNEL, null, null);

    // 🎤 Mic + Camera
    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    // Show local video
    localTracks[1].play("local-player");

    // Publish
    await client.publish(localTracks);

    // Receive remote users
    client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);

        if (mediaType === "video") {
            const remoteContainer = document.createElement("div");
            remoteContainer.id = user.uid;
            remoteContainer.style.width = "300px";
            remoteContainer.style.height = "200px";
            document.getElementById("remote-player").appendChild(remoteContainer);

            user.videoTrack.play(remoteContainer);
        }

        if (mediaType === "audio") {
            user.audioTrack.play();
        }
    });
}

async function shareScreen() {
    const screenTrack = await AgoraRTC.createScreenVideoTrack();

    await client.unpublish(localTracks);

    await client.publish(screenTrack);

    screenTrack.play("local-player");
}

function raiseHand() {
    alert("Hand Raised 🙋‍♂️");
}

function sendMessage() {
    let text = document.getElementById("chat-input").value;

    fetch(`/send-message/${CLASS_ID}/`, {
        method: "POST",
        headers: {"X-CSRFToken": csrftoken},
        body: new URLSearchParams({text: text})
    });
}

function loadMessages() {
    fetch(`/get-messages/${CLASS_ID}/`)
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chat-messages");
        box.innerHTML = "";

        data.messages.forEach(m => {
            box.innerHTML += `<p><b>${m.user}</b>: ${m.text}</p>`;
        });
    });
}

setInterval(loadMessages, 2000);

let micMuted = false;
async function toggleMic() {
    if (micMuted) {
        await localTracks[0].setEnabled(true);
        micMuted = false;
    } else {
        await localTracks[0].setEnabled(false);
        micMuted = true;
    }
}

let camOff = false;
async function toggleCamera() {
    if (camOff) {
        await localTracks[1].setEnabled(true);
        camOff = false;
    } else {
        await localTracks[1].setEnabled(false);
        camOff = true;
    }
}

function muteAll() {
    alert("All students muted (demo)");
}

function endClass() {
    window.location.href = "/dashboard/";
}


let recorder;
let audioChunks = [];

async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    recorder = new MediaRecorder(stream);
    recorder.start();

    recorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };
}

function stopRecording() {
    recorder.stop();

    recorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });

        let audioURL = URL.createObjectURL(blob);

        document.getElementById("chat-messages").innerHTML +=
            `<audio controls src="${audioURL}"></audio>`;

        audioChunks = [];
    };
}

client.on("user-published", async (user, mediaType) => {

    await client.subscribe(user, mediaType);

    let div = document.getElementById("participants-list");

    div.innerHTML += `
        <p id="user-${user.uid}">
            ${user.uid}
            <button onclick="kickUser(${user.uid})">❌</button>
        </p>
    `;
});

function kickUser(uid) {
    let el = document.getElementById(`user-${uid}`);
    if (el) el.remove();

    alert("User removed (UI only)");
}
</script>

{% endblock %}
