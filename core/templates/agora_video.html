{% extends 'base.html' %}

{% block content %}

<style>

.live-wrapper {
    display: flex;
    gap: 10px;
    width: 100%;
    padding: 10px 10px 10px 0;  /* NO LEFT PADDING */
}

/* VIDEO SECTION */
.video-section {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.video-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
    height: 75vh;
}

.video-container.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
}

.video-container.speaker {
    display: flex;
    flex-direction: column;
}

.video-container.speaker .video-box:first-child {
    height: 70vh;
}

.video-container.speaker .video-box {
    height: 120px;
}

.video-box {
    width: 100%;
    height: 100%;
    background: black;
    border-radius: 10px;
}

.remote-video {
    width: 100%;
    height: 100%;
}

/* REMOTE VIDEO (MAIN SCREEN) */
#remote-player {
    width: 100% !important;
    height: 100% !important;
}

.remote-video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 10px;
    width: 100%;
    height: 100%;
}


.local-video {
    position: absolute;
    bottom: 15px;
    right: 15px;
    width: 200px;
    height: 140px;
    border-radius: 10px;
    border: 2px solid white;
}

/* CONTROLS */
.controls-bar {
    margin-top: 10px;
    text-align: center;
}

.controls-bar button {
    margin: 5px;
    padding: 8px 14px;
    border-radius: 8px;
}

/* TEACHER PANEL */
.teacher-panel {
    margin-top: 10px;
    text-align: center;
}

.teacher-panel button {
    margin: 5px;
}

/* RIGHT PANEL */
.right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 320px;
    width: 320px;
    flex-shrink: 0;
}

/* CHAT */

.chat-input {
    display: flex;
    border-top: 1px solid #333;
}

.chat-input input {
    flex: 1;
    padding: 6px;
}

.chat-box {
    display: flex;
    flex-direction: column;
    height: 100%;
    background: #0f172a;
    border-radius: 12px;
    overflow: hidden;
}

.chat-header {
    padding: 10px;
    background: #1e293b;
    color: white;
    font-weight: bold;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* MESSAGE BUBBLES */
.msg {
    max-width: 75%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    position: relative;
}

/* RECEIVED */
.msg-left {
    background: #1e293b;
    color: white;
    align-self: flex-start;
}

/* SENT */
.msg-right {
    background: #6366f1;
    color: white;
    align-self: flex-end;
}

/* TIME */
.msg-time {
    font-size: 10px;
    opacity: 0.7;
    display: block;
    margin-top: 4px;
}

/* INPUT AREA */
.chat-input-area {
    display: flex;
    gap: 5px;
    padding: 8px;
    background: #1e293b;
}

.chat-input-area input {
    flex: 1;
    border-radius: 8px;
    border: none;
    padding: 6px;
}

/* EMOJI BOX */
.emoji-box {
    display: none;
    padding: 10px;
    background: #020617;
    color: white;
    flex-wrap: wrap;
    cursor: pointer;
}
/* PARTICIPANTS */
.participants-box {
    flex: 1;
    background: #222;
    color: white;
    border-radius: 10px;
    padding: 10px;
    overflow-y: auto;
}
</style>



<div class="live-wrapper">

    <!-- VIDEO AREA -->
    <div class="video-section">

        <div class="video-container">

            <!-- REMOTE VIDEO (BIG SCREEN) -->
            <div id="remote-player" class="remote-video-grid"></div>

            <!-- LOCAL VIDEO (SMALL BOX) -->
            <div id="local-player"></div>

        </div>

        <!-- CONTROLS -->
        <div class="controls-bar">
            <button onclick="joinStream()" id="join-btn">🟢 Join</button>
            <button onclick="toggleMic()">🎤</button>
            <button onclick="toggleCamera()">📷</button>
            <button onclick="setGrid()">🔲 Grid</button>
            <button onclick="setSpeaker()">🎯 Speaker</button>
            <button onclick="shareScreen()">🖥</button>
            <button onclick="askAI()">🤖 Ask AI</button>
            <button onclick="leaveCall()">🚪 Leave</button>
        </div>

        <!-- TEACHER PANEL -->
        {% if request.user.user_type == "teacher" %}
        <div class="teacher-panel">
            <button onclick="muteAll()">🔇 Mute All</button>
            <button onclick="endClass()">❌ End Class</button>
        </div>
        {% endif %}

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- CHAT -->
        <div class="chat-box">

            <div class="chat-header">
                💬 Live Chat
            </div>

            <div id="chat-messages" class="chat-messages"></div>

            <div class="chat-input-area">

                <button onclick="toggleEmoji()">😊</button>

                <input type="text" id="chat-input" placeholder="Type a message...">

                <input type="file" id="fileInput" hidden>

                <button onclick="document.getElementById('fileInput').click()">📎</button>

                <button onclick="sendMessage()">➤</button>

                <button onclick="startRecording()">🎤</button>
                <button onclick="stopRecording()">⏹</button>

            </div>

            <!-- EMOJI PICKER -->
            <div id="emojiBox" class="emoji-box">
                😊 😂 😍 😎 👍 🔥 🎯 💯 🙌 😢 😡  
            </div>

        </div>

        <!-- PARTICIPANTS -->
        <div class="participants-box">
            <div class="chat-header">👨‍🎓 Participants</div>
            <div id="participants-list"></div>
        </div>

    </div>

</div>




<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<script>
const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";  // 🔴 PUT YOUR APP ID HERE
const CHANNEL = "class_" + "{{ live_class.id|default:'1' }}";
console.log("CHANNEL:", CHANNEL);

let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
let localTracks = [];

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        let cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            let cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

const csrftoken = getCookie('csrftoken');



async function shareScreen() {
    const screenTrack = await AgoraRTC.createScreenVideoTrack();

    await client.publish(screenTrack);

    // Show in grid (not replace)
    let localContainer = document.createElement("div");
    localContainer.className = "video-box";

    document.getElementById("remote-player").appendChild(localContainer);

    localTracks[1].play(localContainer);
}

function raiseHand() {
    alert("Hand Raised 🙋‍♂️");
}


function loadMessages() {
    fetch(`/get-messages/{{ live_class.id }}/`)
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("chat-messages");
        box.innerHTML = "";

        data.messages.forEach(m => {
            box.innerHTML += `<p><b>${m.user}</b>: ${m.text}</p>`;
        });
    });
}

setInterval(loadMessages, 2000);

let micMuted = false;

async function toggleMic() {
    if (!localTracks.length) return;

    micMuted = !micMuted;
    await localTracks[0].setEnabled(!micMuted);

    // ✅ Show icon
    let btn = document.querySelector('button[onclick="toggleMic()"]');
    btn.innerText = micMuted ? "🔇 Muted" : "🎤 Mic";
}

let camOff = false;
async function toggleCamera() {
    if (camOff) {
        await localTracks[1].setEnabled(true);
        camOff = false;
    } else {
        await localTracks[1].setEnabled(false);
        camOff = true;
    }
}

function muteAll() {
    alert("All students muted (demo)");
}

function endClass() {
    // Notify all via WebSocket
    socket.send(JSON.stringify({
        type: "end_class"
    }));

    window.location.href = "/dashboard/";
}

let recorder;
let audioChunks = [];

async function startRecording() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    recorder = new MediaRecorder(stream);
    recorder.start();

    recorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };
}

function stopRecording() {
    recorder.stop();

    recorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });

        let audioURL = URL.createObjectURL(blob);

        addMessage(`<audio controls src="${audioURL}"></audio>`, "right");

        audioChunks = [];
    };
}


function kickUser(uid) {
    let el = document.getElementById(`user-${uid}`);
    if (el) el.remove();

    alert("User removed (UI only)");
}

function addEmoji(emoji) {
    let input = document.getElementById("chat-input");
    input.value += emoji;
}

function sendFile() {
    let file = document.getElementById("fileInput").files[0];

    let reader = new FileReader();

    reader.onload = function(e) {
        document.getElementById("chat-messages").innerHTML +=
            `<a href="${e.target.result}" target="_blank">📎 File</a><br>`;
    };

    reader.readAsDataURL(file);
}

function askAI() {
    let question = prompt("Ask your doubt:");

    fetch("/ai-help/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrftoken
        },
        body: JSON.stringify({question: question})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chat-messages").innerHTML +=
            `<p><b>AI:</b> ${data.answer}</p>`;
    });
}



function addMessage(text, side) {
    let box = document.getElementById("chat-messages");

    let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    let div = document.createElement("div");
    div.className = `msg msg-${side}`;

    div.innerHTML = `
        ${text}
        <span class="msg-time">${time}</span>
    `;

    box.appendChild(div);

    box.scrollTop = box.scrollHeight;
}


function toggleEmoji() {
    let box = document.getElementById("emojiBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

document.getElementById("emojiBox").addEventListener("click", function(e) {
    if (e.target.innerText) {
        let input = document.getElementById("chat-input");
        input.value += e.target.innerText;
        input.focus();
    }
});


document.getElementById("fileInput").addEventListener("change", function() {
    let file = this.files[0];

    if (!file) return;

    let reader = new FileReader();

    reader.onload = function(e) {
        addMessage(`<a href="${e.target.result}" target="_blank">📎 ${file.name}</a>`, "right");
    };

    reader.readAsDataURL(file);
});


const classId = "{{ live_class.id }}";

let socket = new WebSocket(
    'wss://' + window.location.host + '/ws/chat/{{ class.id }}/'
);

socket.onopen = function() {
    console.log("✅ WebSocket Connected");
};

socket.onerror = function(e) {
    console.log("❌ WebSocket Error", e);
};

socket.onclose = function() {
    console.log("⚠️ WebSocket Closed");
};

socket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    // END CLASS
    if (data.type === "end_class") {
        alert("Class ended by teacher");
        window.location.href = "/dashboard/";
        return;
    }

    // NORMAL CHAT
    let currentUser = "{{ request.user.username }}";
    let side = data.user === currentUser ? "right" : "left";

    addMessage(`<b>${data.user}:</b> ${data.message}`, side);
};

function sendMessage() {
    let input = document.getElementById("chat-input");
    let message = input.value.trim();

    if (!message) return;

    socket.send(JSON.stringify({
        type: "chat",
        message: message
    }));

    input.value = "";
}

// ✅ HANDLE REMOTE USERS
        client.on("user-joined", user => {
            console.log("User joined:", user.uid);
        });
``
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);

            if (mediaType === "video") {
                let player = document.createElement("div");
                player.id = user.uid;
                player.className = "video-box";

                document.getElementById("remote-player").appendChild(player);
                user.videoTrack.play(player);
            }

            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        client.on("user-left", (user) => {
            let el = document.getElementById("user-" + user.uid);
            if (el) el.remove();
        });

async function joinStream() {
    console.log("Join clicked");
    console.log(APP_ID, CHANNEL);

    try {
        const UID = Math.floor(Math.random() * 10000);

        await client.join(APP_ID, CHANNEL, null, UID);

        console.log("Joined channel");

        localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

        // ✅ FIX: PLAY DIRECTLY (NO container creation)
        localTracks[1].play("local-player");

        await client.publish(localTracks);

        console.log("Published stream");


    } catch (error) {
        console.error("JOIN ERROR:", error);
    }
}


async function leaveCall() {
    try {
        // Stop tracks
        localTracks.forEach(track => {
            track.stop();
            track.close();
        });

        // Leave channel
        await client.leave();

        // Clear UI
        document.getElementById("remote-player").innerHTML = "";

        alert("You left the class");

        window.location.href = "/dashboard/";

    } catch (err) {
        console.error(err);
    }
}


function setGrid() {
    let container = document.getElementById("remote-player");
    container.classList.remove("speaker");
    container.classList.add("grid");
}

function setSpeaker() {
    let container = document.getElementById("remote-player");
    container.classList.remove("grid");
    container.classList.add("speaker");
}
</script>

{% endblock %}
