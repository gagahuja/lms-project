{% extends 'base.html' %}

{% block content %}


    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            margin-left: 220px;
            padding: 10px;
            gap: 15px;
            box-sizing: border-box;
        }

        /* VIDEO */
        .video-section {
            flex: 1; /* 🔥 THIS is key */
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
            height: 100%;
        }

        .video-area {
            flex:4;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:10px;
            padding:10px;
        }

        /* VIDEO BOX */
        .video-box {
            width: 100%;
            height: 100%;
            background: black;
            border-radius: 12px;
            position: relative;
            transition: all 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* MAIN VIDEO SIZE */
        .main-video .video-box {
            width: 100%;
            height: 100%;
        }



        /* ACTIVE SPEAKER */
        .active-speaker {
            border: 3px solid #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }


        .video-layout {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 15px;
            color: white;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .video-label span {
            color: white;           /* ensure all text white */
            font-weight: 600;
        }

        .video-box.pinned {
            border: 3px solid gold;
        }

        .user-name {
            font-weight: 500;
        }

        .mic-icon {
            font-size: 16px;
        }

        /* MAIN VIDEO */
        .main-video {
            flex: 1;
            height: 100%;
            display: block;
        }

        #main-video {
            width: 100%;
            height: 100%;
        }

        /* SIDE VIDEOS */
        .side-videos {
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        /* SIDE VIDEO SIZE */
        .side-videos .video-box {
            width: 150px;
            height: 100px;
        }

        /* Chat Container */
        #chat-container {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        /* CHAT PANEL */
        #right-panel {
            width: 350px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* CHAT SECTION */
        #chat-section {
            height: 70%;
            background: #ffffff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* Chat Box */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            color: #000;
            font-size: 14px;
        }

        /* Message Bubble */
        .chat-msg {
            padding: 6px 8px;
            margin-bottom: 5px;
            border-radius: 6px;
            background: #f1f5f9;
        }

        /* Input row */
        #chat-input-row {
            display: flex;
            gap: 5px;
        }

        #chat-message-input {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* TOOLS */
        #chat-tools {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        /* Username */
        .chat-user {
            font-weight: bold;
            color: #2563eb;
        }

        /* Controls Row */
        #chat-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* INPUT */
        #chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }


        .chat-input-area input {
            flex: 1;
            padding: 8px;
        }

        #chat-input-area button {
            background: #2563eb;
            color: white;
        }

        /* Emoji Bar */
        #emoji-bar {
            display: flex;
            gap: 4px;
        }

        /* Emoji Buttons */
        #emoji-bar button {
            border: none;
            background: #e2e8f0;
            border-radius: 5px;
            cursor: pointer;
            padding: 4px;
        }

        /* Emoji row BELOW input */
        #emoji-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        #emoji-row button {
            background: #1e293b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* File row */
        #file-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }


        /* File Upload */
        #file-upload {
            margin-top: 6px;
            display: flex;
            gap: 5px;
        }


        .controls {
            position:fixed;
            bottom:15px;
            left:50%;
            transform:translateX(-50%);
        }

        button {
            margin:5px;
            padding:8px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .side { flex:1; display:flex; flex-direction:column; }

        .chat { flex:1; overflow:auto; padding:10px; }

        .participants {
            padding: 5px;
            background: #fde68a;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        /* PARTICIPANTS = 30% */
        #participants-section {
            height: 30%;
            background: #f3f4f6;
            border-radius: 10px;
            padding: 10px;
        }

        /* Participants BELOW chat */
        #participants-panel {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        #participants-panel h4 {
            margin-bottom: 6px;
            color: #b45309;
        }

        .screen-share {
            width: 100%;
            height: 100%;
            background: black;
        }

        .hand-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            background: yellow;
            color: black;
            padding: 4px;
            border-radius: 50%;
            font-size: 14px;
        }
    </style>


<div class="main-container">

    <!-- LEFT SIDE: VIDEO -->
    <div class="video-section">

        <div class="video-layout">

            <!-- MAIN VIDEO -->
            <div class="main-video" id="main-video"></div>

            <!-- SIDE VIDEOS -->
            <div class="side-videos" id="side-videos"></div>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div id="right-panel">

            <!-- CHAT (70%) -->
            <div id="chat-section">
                <div id="chat-box"></div>

                <div id="chat-input-area">
                    <input id="chat-message-input" placeholder="Type message..." />
                    <button onclick="sendMessage()">Send</button>
                </div>

                <div id="chat-tools">
                    <div id="emoji-bar">
                        <button onclick="addEmoji('😊')">😊</button>
                        <button onclick="addEmoji('😂')">😂</button>
                        <button onclick="addEmoji('👍')">👍</button>
                        <button onclick="addEmoji('🙏')">🙏</button>
                    </div>

                    <div id="file-bar">
                        <input type="file" id="fileInput">
                    </div>
                </div>
            </div>

            <!-- PARTICIPANTS (30%) -->
            <div id="participants-section">
                <h4>Participants</h4>
                <div id="participants-list"></div>
            </div>

        </div>
    </div>

</div>

<div class="controls">
    <button onclick="join()">Join</button>
    <button onclick="toggleMic()">Mic</button>
    <button onclick="toggleCam()">Cam</button>
    <button onclick="setGrid()">Grid</button>
    <button onclick="setSpotlight()">Spotlight</button>
    <button onclick="shareScreen()">Share</button>
    <button onclick="toggleRaiseHand()">✋ Raise Hand</button>

    {% if request.user.is_staff %}
    <button onclick="muteAll()">Mute All</button>
    <button onclick="endClass()">End</button>
    {% endif %}

    <button onclick="leave()">Leave</button>
</div>

<script>

const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";
const CHANNEL = "class_{{ live_class.id }}";

let client = AgoraRTC.createClient({mode:"rtc", codec:"vp8"});
let localTracks = [];
let layoutBeforeScreen = {
    main: null,
    side: []
};
let screenUid = null;
let userMap = {};
let isTeacher = "{{ request.user.is_staff }}" === "True";
let users = {};
let activeUser = null;
let pinnedUser = null;
let lastSwitchTime = 0;
let raisedHands = {};

// SOCKET
let socket;

function connectSocket(retry = 0){

    let wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    let roomName = window.location.pathname.split("/").filter(Boolean).pop();

    console.log("Connecting WS to room:", roomName);

    socket = new WebSocket(
        wsScheme + "://" + window.location.host + "/ws/chat/" + roomName + "/"
    );

    socket.onopen = () => {
        console.log("✅ WebSocket CONNECTED");
    };

    socket.onerror = (e) => {
        console.log("❌ WS ERROR", e);
    };

    socket.onclose = () => {
        console.log("❌ WS CLOSED");

        // 🔥 RETRY LOGIC (VERY IMPORTANT)
        if(retry < 5){
            setTimeout(() => {
                console.log("🔁 Retrying WS...", retry+1);
                connectSocket(retry + 1);
            }, 2000);
        }
    };

    socket.onmessage = e => {
        console.log("RECEIVED:", e.data);

        let data = JSON.parse(e.data);

        if(data.type === "chat"){

            let user = data.user || "User";

            // mark your own messages
            if(user === "{{ request.user.username }}"){
                user = "You";
            }

            // 🔥 THIS IS THE LINE YOU WERE ASKING ABOUT
            addMessage(user, data.message);
        }

        if(data.type === "kick"){
            if(String(client.uid) === String(data.target)){
                alert("Kicked by teacher");
                leave();
            }
        }

        if(data.type === "mute_all"){
            if(localTracks[0]) localTracks[0].setEnabled(false);
        }

        if(data.type === "end_class"){
            alert("Class Ended");
            leave();
        }

        if(data.type === "mic_status"){

            let micIcon = document.getElementById("mic-" + data.uid);

            if(micIcon){
                micIcon.innerText = data.status === "on" ? "🎤" : "🔇";
            }
        }

        if(data.type === "raise_hand"){

            if(data.action === "raise"){
                raisedHands[data.uid] = data.username;
            } else {
                delete raisedHands[data.uid];
            }

            updateRaisedHandsUI();
            updateVideoHandIcon(data.uid);
        }
    };
}

// JOIN
async function join(){

    let UID = Math.floor(Math.random()*10000);
    client.uid = UID;

    await client.join(APP_ID, CHANNEL, null, UID);

    userMap[UID] = "{{ request.user.username }}";

    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    let box = createVideoBox(UID, "{{ request.user.username }}");

    // move to main
    document.getElementById("main-video").innerHTML = "";
    document.getElementById("main-video").appendChild(box);

    // play video
    localTracks[1].play("player-" + UID);

    users[UID] = "{{ request.user.username }}";  // ✅ FIX
    updateParticipants();

    activeUser = UID;

    await client.publish(localTracks);
}




// REMOTE
client.on("user-unpublished", async (user) => {

    if(user.uid === screenUid){

        isScreenSharing = false;
        screenUid = null;

        restoreLayoutExact();

        console.log("✅ Remote screen restore fixed");
    }
});

// VIDEO BOX
function createVideoBox(uid, name="User"){

    let box = document.createElement("div");
    box.id = "video-" + uid;
    box.className = "video-box";

    let player = document.createElement("div");
    player.id = "player-" + uid;
    player.style.width = "100%";
    player.style.height = "100%";

    let label = document.createElement("div");
    label.className = "video-label";
    label.innerHTML = `
        <span class="user-name">${name}</span>
        <span id="mic-${uid}" class="mic-icon">🎤</span>
    `;

    box.appendChild(player);
    box.appendChild(label);

    return box;
}

// CHAT
function sendMessage(){
    let input = document.getElementById("chat-message-input");
    let fileInput = document.getElementById("fileInput");

    let message = input.value.trim();
    let file = fileInput.files[0];

    if(!socket || socket.readyState !== 1){
        alert("Chat not connected");
        return;
    }

    // 📎 FILE PRIORITY
    if(file){
        let formData = new FormData();
        formData.append("file", file);

        fetch("/upload/", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.url){
                socket.send(JSON.stringify({
                    type: "chat",
                    message: `📎 FILE:${data.url}|${data.name}`
                }));
            }
        });

        fileInput.value = "";
    }

    // 💬 TEXT / EMOJI
    if(message){
        socket.send(JSON.stringify({
            type: "chat",
            message: message
        }));

        input.value = "";
    }
}

function addMessage(user, msg){
    let box = document.getElementById("chat-box");

    let div = document.createElement("div");
    div.className = "chat-msg";

    let name = document.createElement("span");
    name.className = "chat-user";
    name.innerText = user + ": ";

    let content = document.createElement("span");

    if(msg.startsWith("📎 FILE:")){
        let parts = msg.replace("📎 FILE:", "").split("|");
        let url = parts[0];
        let fname = parts[1];

        let link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.innerText = "📎 " + fname;
        link.style.color = "#4ade80";

        content.appendChild(link);
    } else {
        content.innerText = msg;
    }

    div.appendChild(name);
    div.appendChild(content);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}


// PARTICIPANTS
function updateParticipants(){
    let div = document.getElementById("participants-list");

    if(!div) return;

    div.innerHTML = "";

    Object.keys(users).forEach(uid => {

        let item = document.createElement("div");
        let hand = raisedHands[uid] ? " ✋" : "";

        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.style.marginBottom = "5px";

        item.innerHTML = `
            <span>${users[uid]}</span>
            ${isTeacher ? `<button onclick="kick(${uid})">❌</button>` : ""}
            <span>${users[uid]} ${hand}</span>
        `;

        div.appendChild(item);
    });
}

// CONTROLS
async function toggleMic(){
    let enabled = localTracks[0].enabled;
    let newState = !enabled;

    await localTracks[0].setEnabled(newState);

    // 🔥 update your own UI instantly
    let micIcon = document.getElementById("mic-" + client.uid);
    if(micIcon){
        micIcon.innerText = newState ? "🎤" : "🔇";
    }

    // 🔥 send to others
    socket.send(JSON.stringify({
        type: "mic_status",
        uid: client.uid,
        status: newState ? "on" : "off"
    }));
}

function toggleCam(){
    if(localTracks[1]) localTracks[1].setEnabled(!localTracks[1].enabled);
}

let screenTrack = null;
let isScreenSharing = false;

async function shareScreen(){

    try {

        if(!isScreenSharing){

            // 🧠 SAVE CURRENT LAYOUT BEFORE SCREEN SHARE
            layoutBeforeScreen.main = activeUser;

            layoutBeforeScreen.side = [];

            document.querySelectorAll("#side-videos .video-box").forEach(v => {
                layoutBeforeScreen.side.push(v.id.replace("video-", ""));
            });

            console.log("📦 Layout Saved:", layoutBeforeScreen);

            screenTrack = await AgoraRTC.createScreenVideoTrack();

            // REMOVE CAMERA FROM MAIN
            await client.unpublish(localTracks[1]);

            // MOVE CAMERA TO SIDE
            let camBox = document.getElementById("video-" + client.uid);
            document.getElementById("side-videos").appendChild(camBox);

            // CREATE SCREEN BOX
            let screenBox = document.createElement("div");
            screenBox.className = "video-box";
            screenBox.id = "screen-box";

            // 🔥 ADD ANIMATION HERE
            screenBox.classList.add("fade-in");

            document.getElementById("main-video").innerHTML = "";
            document.getElementById("main-video").appendChild(screenBox);

            // remove animation after play
            setTimeout(() => {
                screenBox.classList.remove("fade-in");
            }, 300);

            screenTrack.play("screen-box");

            await client.publish(screenTrack);

            isScreenSharing = true;

        } 
        else {

            // 🔻 STOP SCREEN TRACK
            await client.unpublish(screenTrack);
            screenTrack.stop();
            screenTrack.close();
            screenTrack = null;

            isScreenSharing = false;

            // remove screen only
            let screenBox = document.getElementById("screen-box");
            if(screenBox) screenBox.remove();

            // restore camera
            await client.publish(localTracks[1]);

            // 🔥 USE SAFE RESTORE
            restoreLayoutExact();

            // 🔥 FORCE VIDEO REPLAY
            setTimeout(() => {
                localTracks[1].play("player-" + client.uid);
            }, 100);

            console.log("✅ EXACT layout restored");
        }

    } catch(err){
        console.error(err);
        alert("Screen share failed");
    }
}

function muteAll(){
    socket.send(JSON.stringify({type:"mute_all"}));
}

function endClass(){
    socket.send(JSON.stringify({type:"end_class"}));
}

function kick(uid){
    socket.send(JSON.stringify({type:"kick", target:uid}));
}

function leave(){
    location.reload();
}


async function uploadFile(){
    let fileInput = document.getElementById("fileInput");
    let file = fileInput.files[0];

    if(!file){
        alert("Select file first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("/upload/", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if(data.url){
        socket.send(JSON.stringify({
            type: "chat",
            message: `📎 FILE:${data.url}|${data.name}`
        }));
    } else {
        alert("Upload failed");
    }
}


// ENTER key to send message
document.getElementById("chat-message-input").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        sendMessage();
    }
});


document.addEventListener("click", function(e){

    let box = e.target.closest(".video-box");
    if(!box) return;

    let uid = box.id.replace("video-", "");

    // 🔥 TOGGLE PIN
    if(pinnedUser === uid){
        pinnedUser = null;
        console.log("📌 Unpinned");
    } else {
        pinnedUser = uid;
        console.log("📌 Pinned:", uid);
        setMainVideo(uid);
    }
    document.querySelectorAll(".video-box").forEach(b => b.classList.remove("pinned"));

    if(pinnedUser){
        document.getElementById("video-" + pinnedUser)?.classList.add("pinned");
    }
});


function setMainVideo(uid){

    if(pinnedUser && uid !== pinnedUser) return;

    if(activeUser == uid) return;

    let now = Date.now();

    // 🔥 prevent fast switching
    if(now - lastSwitchTime < 1500) return;

    lastSwitchTime = now;

    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    let selected = document.getElementById("video-" + uid);

    if(!selected) return;

    // remove highlight
    document.querySelectorAll(".video-box")
        .forEach(b => b.classList.remove("active-speaker"));

    // add highlight
    selected.classList.add("active-speaker");

    // move current main to side
    let currentMain = main.querySelector(".video-box");
    if(currentMain && currentMain !== selected){
        side.appendChild(currentMain);
    }

    // set new main
    main.innerHTML = "";

    selected.classList.add("fade-in");

    main.appendChild(selected);

    // remove animation class after animation ends
    setTimeout(() => {
        selected.classList.remove("fade-in");
    }, 300);

    activeUser = uid;
}


client.enableAudioVolumeIndicator();

let lastSwitch = 0;

client.on("volume-indicator", volumes => {

    volumes.forEach(v => {

        if(v.level > 6){

            if(isScreenSharing){
                // 🔥 ONLY highlight in grid
                document.querySelectorAll(".video-box")
                    .forEach(b => b.classList.remove("active-speaker"));

                let box = document.getElementById("video-" + v.uid);
                if(box) box.classList.add("active-speaker");

            } else {
                // normal behavior
                if(activeUser != v.uid){
                    setMainVideo(v.uid);
                }
            }
        }

    });

});


function setGrid(){
    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    side.innerHTML = "";

    Object.values(users).forEach(box=>{
        main.appendChild(box);
    });
}

function setSpotlight(){
    // restore layout
    location.reload();
}

client.on("user-left", user => {

    delete users[user.uid];

    let el = document.getElementById("user-" + user.uid);
    if(el) el.remove();

    updateParticipants();
});

window.onload = () => {
    connectSocket();
};


function addEmoji(emoji){
    let input = document.getElementById("chat-message-input");
    input.value += emoji;
    input.focus();
}

client.on("user-unpublished", async (user) => {

    if(user.uid === screenUid){

        isScreenSharing = false;
        screenUid = null;

        let main = document.getElementById("main-video");
        let side = document.getElementById("side-videos");

        main.innerHTML = "";
        side.innerHTML = "";

        // 🔥 restore main
        let mainBox = document.getElementById("video-" + layoutBeforeScreen.main);
        if(mainBox){
            //main.appendChild(mainBox);
            activeUser = layoutBeforeScreen.main;
        }

        // 🔥 restore side
        layoutBeforeScreen.side.forEach(uid => {
            let box = document.getElementById("video-" + uid);
            if(box){
                side.appendChild(box);
            }
        });

        console.log("✅ Remote layout restored EXACTLY");
    }
});


function restoreLayoutExact(){

    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    let targetId = "video-" + layoutBeforeScreen.main;
    let targetBox = document.getElementById(targetId);

    if(!targetBox){
        console.log("❌ No main video found");
        return;
    }

    // 🔥 STEP 1: MOVE TARGET TO MAIN DIRECTLY
    main.appendChild(targetBox);

    // 🔥 STEP 2: UPDATE ACTIVE USER
    activeUser = layoutBeforeScreen.main;

    // 🔥 STEP 3: FIX SIDE ORDER
    layoutBeforeScreen.side.forEach(uid => {
        let box = document.getElementById("video-" + uid);
        if(box){
            side.appendChild(box);
        }
    });

    console.log("✅ Layout restored EXACTLY (no grid issue)");
}

function toggleRaiseHand(){

    let isRaised = raisedHands[client.uid];

    let action = isRaised ? "lower" : "raise";

    socket.send(JSON.stringify({
        type: "raise_hand",
        uid: client.uid,
        username: userMap[client.uid],
        action: action
    }));
}

function updateVideoHandIcon(uid){

    let box = document.getElementById("video-" + uid);
    if(!box) return;

    let existing = box.querySelector(".hand-icon");

    if(raisedHands[uid]){

        if(!existing){
            let icon = document.createElement("div");
            icon.className = "hand-icon";
            icon.innerText = "✋";
            box.appendChild(icon);
        }

    } else {
        if(existing) existing.remove();
    }
}

</script>

{% endblock %}
