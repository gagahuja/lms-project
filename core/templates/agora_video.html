{% extends 'base.html' %}

{% block content %}

<h3>🎥 Live Class (Agora)</h3>

<div id="videos" class="row"></div>

<button onclick="joinCall()" class="btn btn-success mt-3">Join Class</button>
<div id="local-player" style="width: 300px; height: 200px;"></div>
<div id="remote-player" style="width: 300px; height: 200px;"></div>
<button onclick="shareScreen()" class="btn btn-info">🖥 Share Screen</button>
<button onclick="raiseHand()" class="btn btn-warning">✋ Raise Hand</button>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

<script>
const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";  // 🔴 PUT YOUR APP ID HERE
const CHANNEL = "{{ class_id }}";

let client;
let localTracks = [];

async function joinCall() {
    client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

    await client.join(APP_ID, CHANNEL, null, null);

    // 🎤 Mic + Camera
    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    // Show local video
    localTracks[1].play("local-player");

    // Publish
    await client.publish(localTracks);

    // Receive remote users
    client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);

        if (mediaType === "video") {
            const remoteContainer = document.createElement("div");
            remoteContainer.id = user.uid;
            remoteContainer.style.width = "300px";
            remoteContainer.style.height = "200px";
            document.getElementById("remote-player").appendChild(remoteContainer);

            user.videoTrack.play(remoteContainer);
        }

        if (mediaType === "audio") {
            user.audioTrack.play();
        }
    });
}

async function shareScreen() {
    const screenTrack = await AgoraRTC.createScreenVideoTrack();
    await client.unpublish(localTracks);
    await client.publish(screenTrack);
    screenTrack.play("local-player");
}

function raiseHand() {
    alert("Hand Raised 🙋‍♂️");
}
</script>

{% endblock %}
