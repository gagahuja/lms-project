{% extends 'base.html' %}

{% block content %}


    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            margin-left: 220px;
            padding: 10px;
            gap: 15px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
            overflow: hidden;
        }

        /* VIDEO */
        .video-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        
        /* VIDEO BOX */
        .video-box {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
            border-radius: 8px;
            overflow: hidden;
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* MAIN VIDEO SIZE */
        .main-video .video-box {
            width: 100%;
            height: 100%;
            transform: scale(1);
        }



        /* ACTIVE SPEAKER */
        .active-speaker {
            border: 3px solid #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }


        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 15px;
            color: white;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .video-label span {
            color: white;           /* ensure all text white */
            font-weight: 600;
        }

        .video-box.pinned {
            border: 3px solid gold;
        }

        .video-box.active-speaker {
            border: 3px solid #22c55e;
        }

        .user-name {
            font-weight: 500;
        }

        .video-overlay{
            position:absolute;
            bottom:6px;
            left:6px;
            right:6px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:rgba(0,0,0,0.4);
            padding:4px 8px;
            border-radius:6px;
            color:white;
            font-size:13px;
        }

        .mic-icon {
            font-size: 16px;
        }

        .video-top {
            display: flex;
            gap: 10px;
        }
        
        #main-video {
            flex: 4;
            width: 100%;
            height: 60%;
            background: black;
            border-radius: 10px;
        }

        /* SIDE VIDEOS */
        #side-videos {
            width: 100%;
            height: calc(40% - 10px);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            overflow-y: auto;
        }
        

        #side-videos .video-box {
            height: 120px;
            transform: scale(0.95);
        }

        /* Optional hover effect */
        .side-videos .video-box:hover {
            transform: scale(1.05);
        }
        

        /* Chat Container */
        #chat-container {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        /* CHAT PANEL */
        #right-panel {
            width: 350px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* CHAT SECTION */
        #chat-section {
            height: 70%;
            background: #ffffff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* RIGHT CHAT */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        /* Chat Box */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            color: #000;
            font-size: 14px;
        }

        /* Message Bubble */
        .chat-msg {
            padding: 6px 8px;
            margin-bottom: 5px;
            border-radius: 6px;
            background: #f1f5f9;
        }

        /* Input row */
        #chat-input-row {
            display: flex;
            gap: 5px;
        }

        #chat-message-input {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* TOOLS */
        #chat-tools {
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        /* Username */
        .chat-user {
            font-weight: bold;
            color: #2563eb;
        }

        /* Controls Row */
        #chat-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* INPUT */
        #chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }


        .chat-input-area input {
            flex: 1;
            padding: 8px;
        }

        #chat-input-area button {
            background: #2563eb;
            color: white;
        }

        /* Emoji Bar */
        #emoji-bar {
            display: flex;
            gap: 4px;
        }

        /* Emoji Buttons */
        #emoji-bar button {
            border: none;
            background: #e2e8f0;
            border-radius: 5px;
            cursor: pointer;
            padding: 4px;
        }

        /* Emoji row BELOW input */
        #emoji-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        #emoji-row button {
            background: #1e293b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* File row */
        #file-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }


        /* File Upload */
        #file-upload {
            margin-top: 6px;
            display: flex;
            gap: 5px;
        }


        /*.controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
        }*/

        /* CONTROLS RIGHT (VERTICAL) */
        .controls-vertical {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* BUTTON STYLE */
        .controls-vertical button {
            width: 100%;
            padding: 10px;
        }

        button {
            margin:5px;
            padding:8px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .side { flex:1; display:flex; flex-direction:column; }

        .chat { flex:1; overflow:auto; padding:10px; }

        .participants {
            padding: 5px;
            background: #fde68a;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        /* PARTICIPANTS = 30% */
        #participants-section {
            height: 30%;
            background: #f3f4f6;
            border-radius: 10px;
            padding: 10px;
        }

        /* Participants BELOW chat */
        #participants-panel {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        #participants-panel h4 {
            margin-bottom: 6px;
            color: #b45309;
        }

        .screen-share {
            width: 100%;
            height: 100%;
            background: black;
        }

        .hand-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            background: yellow;
            color: black;
            padding: 4px;
            border-radius: 50%;
            font-size: 14px;
        }

        .reaction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            font-size: 32px;
            animation: floatAdvanced 4s ease-out forwards;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-80px) scale(1.1);
            }
            60% {
                transform: translateY(-160px) scale(1.05);
            }
            100% {
                opacity: 0;
                transform: translateY(-260px) scale(0.95);
            }
        }

        /* 🔥 ADVANCED FLOAT (smooth + drift + scale) */
        @keyframes floatAdvanced {
            0% {
                opacity: 0;
                transform: translate(-50%, 0) scale(0.8);
            }
            10% {
                opacity: 1;
                transform: translate(-50%, -40px) scale(1.1);
            }
            40% {
                transform: translate(calc(-50% + 20px), -140px) scale(1.05);
            }
            70% {
                transform: translate(calc(-50% - 20px), -240px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -320px) scale(0.9);
            }
        }

        .video-box.spotlight {
            border: 3px solid #facc15;
            box-shadow: 0 0 15px #facc15;
        }

        .player {
            width: 100%;
            height: 100%;
        }

        .camera-off .player{
            display:none;
        }

        .camera-off::after{
            content:"Camera Off";
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            color:white;
            font-size:16px;
        }
        
    </style>


<div class="container">

    <!-- LEFT SIDE: VIDEO -->
    <div class="video-section">

        <div class="video-top">

            <div id="main-video"></div>

            <div class="controls-vertical">
                <button onclick="join()">Join</button>
                <button onclick="toggleMic()">Mic</button>
                <button onclick="toggleCam()">Cam</button>
                <button onclick="setGrid()">Grid</button>
                <button onclick="setSpotlight()">Spotlight</button>
                <button onclick="shareScreen()">Share</button>
                <button onclick="toggleRaiseHand()">✋ Raise Hand</button>
                <button onclick="sendReaction('👍')">👍</button>
                <button onclick="sendReaction('👏')">👏</button>
                <button onclick="sendReaction('❤️')">❤️</button>
                <button onclick="sendReaction('🔥')">🔥</button>

                {% if request.user.is_staff %}
                <button onclick="muteAll()">Mute All</button>
                <button onclick="endClass()">End</button>
                {% endif %}

                <button onclick="leave()">Leave</button>
            </div>

        </div>

        <div id="side-videos"></div>

    </div>

    <!-- RIGHT SIDE -->
    <div id="right-panel">

            <!-- CHAT (70%) -->
            <div id="chat-section">
                <div id="chat-box"></div>

                <div id="chat-input-area">
                    <input id="chat-message-input" placeholder="Type message..." />
                    <button onclick="sendMessage()">Send</button>
                </div>

                <div id="chat-tools">
                    <div id="emoji-bar">
                        <button onclick="addEmoji('😊')">😊</button>
                        <button onclick="addEmoji('😂')">😂</button>
                        <button onclick="addEmoji('👍')">👍</button>
                        <button onclick="addEmoji('🙏')">🙏</button>
                    </div>

                    <div id="file-bar">
                        <input type="file" id="fileInput">
                    </div>
                </div>
            </div>

            <!-- PARTICIPANTS (30%) -->
            <div id="participants-section">
                <h4>Participants</h4>
                <div id="participants-list"></div>
            </div>

        </div>
    </div>

</div>



<script>

const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";
const roomName = "{{ room_name|default:'default' }}"
const CHANNEL = roomName;
const userName = "{{ user_name|default:'Guest' }}"

let client = AgoraRTC.createClient({mode:"rtc", codec:"vp8"});
let screenClient = AgoraRTC.createClient({mode:"rtc", codec:"vp8"});
client.on("user-joined", user => {
    console.log("User joined:", user.uid);
});
let screenTrack;
let localTracks = [];
let layoutBeforeScreen = {
    main: null,
    side: []
};

let state = {
    activeUser: null,
    screenUser: null,
    isScreenSharing: false
};
state.pinnedUser = null;
let screenUid = null;
let isReacting = false;
let reactionUid = null;
let userMap = {};
let isTeacher = "{{ request.user.is_staff }}" === "True";
let users = {};
let pinnedUser = null;
let lastSwitchTime = 0;
let raisedHands = {};
let spotlightUser = null;


function safeUpdateMain(){

    let now = Date.now();

    if(now - lastSwitch < 1000){
        return; // 🚫 block rapid switching
    }

    lastSwitch = now;

    updateMainView();
}

// SOCKET
let socket;

function connectSocket(retry = 0){

    let wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    let wsRoom = window.location.pathname.split("/").filter(Boolean).pop();

    console.log("Connecting WS to room:", roomName);

    socket = new WebSocket(
        wsScheme + "://" + window.location.host + "/ws/chat/" + wsRoom + "/"
    );

    socket.onopen = () => {
        console.log("✅ WebSocket CONNECTED");
    };

    socket.onerror = (e) => {
        console.log("❌ WS ERROR", e);
    };

    socket.onclose = () => {
        console.log("❌ WS CLOSED");

        // 🔥 RETRY LOGIC (VERY IMPORTANT)
        if(retry < 5){
            setTimeout(() => {
                console.log("🔁 Retrying WS...", retry+1);
                connectSocket(retry + 1);
            }, 2000);
        }
    };

    socket.onmessage = e => {
        console.log("RECEIVED:", e.data);

        let data = JSON.parse(e.data);

        if(data.type === "chat"){

            let user = data.user || "User";

            // mark your own messages
            if(user === "{{ request.user.username }}"){
                user = "You";
            }

            // 🔥 THIS IS THE LINE YOU WERE ASKING ABOUT
            addMessage(user, data.message);
        }

        if(data.type === "kick"){
            if(String(client.uid) === String(data.target)){
                alert("Kicked by teacher");
                leave();
            }
        }

        if(data.type === "mute_all"){
            if(localTracks[0]) localTracks[0].setEnabled(false);
        }

        if(data.type === "end_class"){
            alert("Class Ended");
            leave();
        }

        if(data.type === "mic_status"){
            let el = document.getElementById("mic-" + data.uid);
            if(el){
                el.innerText = data.status === "on" ? "🎤" : "🔇";
            }
        }

        if(data.type === "raise_hand"){

            if(data.action === "raise"){
                raisedHands[data.uid] = data.username;
            } else {
                delete raisedHands[data.uid];
            }

            updateRaisedHandsUI();
            updateVideoHandIcon(data.uid);
        }

        if(data.type === "reaction"){
            showReaction(data.uid, data.emoji);
        }

        if(data.type === "user_join"){

            userMap[data.uid] = data.username;
            users[data.uid] = data.username;

            updateParticipants();

            // 🔥 UPDATE VIDEO NAME
            let el = document.getElementById("name-" + data.uid);
            if(el){
                el.innerText = data.username;
            }
        }

        if(data.type === "spotlight"){

            document.querySelectorAll(".video-box")
            .forEach(b => b.classList.remove("spotlight"));

            if(data.action === "on"){
                spotlightUser = data.uid;

                document.getElementById("video-" + data.uid)
                    ?.classList.add("spotlight");


                // 🔥 FORCE MAIN VIDEO
                setMainVideo(data.uid);

            } else {
                spotlightUser = null;
            }
        }
    };
}

// JOIN
async function join(){

    let UID = String(Date.now());  // stable unique id
    client.uid = UID;

    await client.join(APP_ID, CHANNEL, null, UID);

    userMap[UID] = "{{ request.user.username }}";

    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    if(!document.getElementById("video-" + UID)){
        let box = createVideoBox(UID, "{{ request.user.username }}");
        document.getElementById("side-videos").appendChild(box);
    }

    // play video
    localTracks[1].play("player-" + UID);

    // store correct name
    userMap[UID] = "{{ request.user.username }}";
    users[UID] = "{{ request.user.username }}";

    updateParticipants();

    // set active speaker
    state.activeUser = UID;

    // THEN layout decides main
    updateLayout();

    await client.publish(localTracks);

    
    socket.send(JSON.stringify({
        type: "user_join",
        uid: UID,
        username: "{{ request.user.username }}"
    }));
}


// REMOTE
client.on("user-published", async (user, mediaType) => {

    await client.subscribe(user, mediaType);

    let uid = String(user.uid);

    // ❗ ALWAYS resolve name here
    let name = userMap[uid] || "User";

    users[uid] = name;
    updateParticipants();

    if(document.getElementById("video-" + uid)) return;

    let box = createVideoBox(uid, name);
    document.getElementById("side-videos").appendChild(box);

    if(mediaType === "video"){

        let uid = String(user.uid);

        let box = document.getElementById("video-" + uid);

        if(!box){
            box = createVideoBox(uid, userMap[uid] || "User");
            document.getElementById("side-videos").appendChild(box);
        }

        user.videoTrack.play("player-" + uid);

        // 🔥 SCREEN SHARE DETECTION
        if(uid.includes("_screen")){

            state.isScreenSharing = true;
            state.screenUser = uid;

            // 🔥 ONLY MOVE SCREEN TO MAIN
            moveToMain(uid);

            return; // ❗ STOP further layout logic
        } else {

            // normal user
            if(!state.isScreenSharing && !state.pinnedUser){
                state.activeUser = uid;
            }

            updateLayout();
        }
    }

    if(mediaType === "audio"){
        user.audioTrack.play();
    }

    // set first speaker
    if(!state.activeUser){
        state.activeUser = uid;
    }

    updateLayout();
});

console.log("Users map:", users);

// VIDEO BOX
function createVideoBox(uid, name){

    let div = document.createElement("div");
    div.className = "video-box";
    div.id = "video-" + uid;

    div.innerHTML = `
        <div id="player-${uid}" class="player"></div>

        <div class="video-overlay">
            <span class="user-name" id="name-${uid}">${name}</span>
            <span class="mic-icon" id="mic-${uid}">🎤</span>
        </div>
    `;

    div.onclick = () => {

        if(state.pinnedUser === uid){
            state.pinnedUser = null;
        } else {
            state.pinnedUser = uid;
        }

        updateLayout();
    };

    return div;
}

function updateLayout(){

    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    let target;

    if(state.isScreenSharing && state.screenUser){
        target = state.screenUser;

    } else if(state.pinnedUser){
        target = state.pinnedUser;

    } else {
        target = state.activeUser;
    }

    if(!target) return;

    let targetBox = document.getElementById("video-" + target);
    if(!targetBox) return;

    // ❗ DO NOT CLEAR MAIN (THIS WAS BREAKING VIDEO)
    if(!main.contains(targetBox)){
        main.appendChild(targetBox);
    }

    document.querySelectorAll(".video-box").forEach(box => {
        if(box.id !== "video-" + target){
            if(!side.contains(box)){
                side.appendChild(box);
            }
        }
    });
}

// CHAT
function sendMessage(){
    let input = document.getElementById("chat-message-input");
    let fileInput = document.getElementById("fileInput");

    let message = input.value.trim();
    let file = fileInput.files[0];

    if(!socket || socket.readyState !== 1){
        alert("Chat not connected");
        return;
    }

    // 📎 FILE PRIORITY
    if(file){
        let formData = new FormData();
        formData.append("file", file);

        fetch("/upload/", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.url){
                socket.send(JSON.stringify({
                    type: "chat",
                    message: `📎 FILE:${data.url}|${data.name}`
                }));
            }
        });

        fileInput.value = "";
    }

    // 💬 TEXT / EMOJI
    if(message){
        socket.send(JSON.stringify({
            type: "chat",
            message: message
        }));

        input.value = "";
    }
}

function addMessage(user, msg){
    let box = document.getElementById("chat-box");

    let div = document.createElement("div");
    div.className = "chat-msg";

    let name = document.createElement("span");
    name.className = "chat-user";
    name.innerText = user + ": ";

    let content = document.createElement("span");

    if(msg.startsWith("📎 FILE:")){
        let parts = msg.replace("📎 FILE:", "").split("|");
        let url = parts[0];
        let fname = parts[1];

        let link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.innerText = "📎 " + fname;
        link.style.color = "#4ade80";

        content.appendChild(link);
    } else {
        content.innerText = msg;
    }

    div.appendChild(name);
    div.appendChild(content);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}


// PARTICIPANTS
function updateParticipants(){

    let list = document.getElementById("participants-list");
    list.innerHTML = "";

    Object.keys(users).forEach(uid => {

        let div = document.createElement("div");
        div.className = "participants";
        div.innerText = users[uid];

        list.appendChild(div);
    });
}

// CONTROLS
function toggleMic(){

    localTracks[0].setEnabled(!localTracks[0].enabled);

    let status = localTracks[0].enabled ? "on" : "off";

    document.getElementById("mic-" + UID).innerText =
        status === "on" ? "🎤" : "🔇";

    socket.send(JSON.stringify({
        type: "mic_status",
        uid: UID,
        status: status
    }));
}


function toggleCam(){

    localTracks[1].setEnabled(!localTracks[1].enabled);

    let box = document.getElementById("video-" + UID);

    if(!localTracks[1].enabled){
        box.classList.add("camera-off");
    } else {
        box.classList.remove("camera-off");
    }
}


async function shareScreen(){

    if(state.isScreenSharing){
        stopScreenShare();
        return;
    }

    screenTrack = await AgoraRTC.createScreenVideoTrack();

    await screenClient.join(APP_ID, CHANNEL, null, client.uid + "_screen");
    await screenClient.publish([screenTrack]);

    state.isScreenSharing = true;
    state.screenUser = client.uid + "_screen";

    // 🔥 CREATE MAIN SCREEN
    let main = document.getElementById("main-video");
    main.innerHTML = "";

    let box = createVideoBox(state.screenUser, "Screen");
    main.appendChild(box);

    screenTrack.play("player-" + state.screenUser);

    updateLayout();

    screenTrack.on("track-ended", stopScreenShare);
}

function muteAll(){
    socket.send(JSON.stringify({type:"mute_all"}));
}

function endClass(){
    socket.send(JSON.stringify({type:"end_class"}));
}

function kick(uid){
    socket.send(JSON.stringify({type:"kick", target:uid}));
}

function leave(){
    location.reload();
}


async function uploadFile(){
    let fileInput = document.getElementById("fileInput");
    let file = fileInput.files[0];

    if(!file){
        alert("Select file first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("/upload/", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if(data.url){
        socket.send(JSON.stringify({
            type: "chat",
            message: `📎 FILE:${data.url}|${data.name}`
        }));
    } else {
        alert("Upload failed");
    }
}


// ENTER key to send message
document.getElementById("chat-message-input").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        sendMessage();
    }
});


document.addEventListener("click", function(e){

    let box = e.target.closest(".video-box");
    if(!box) return;

    let uid = box.id.replace("video-", "");

    // 🔥 TEACHER → SPOTLIGHT
    if(isTeacher){

        if(spotlightUser === uid){
            spotlightUser = null;

            socket.send(JSON.stringify({
                type: "spotlight",
                uid: uid,
                action: "off"
            }));

            console.log("🎯 Spotlight OFF");

        } else {
            spotlightUser = uid;

            socket.send(JSON.stringify({
                type: "spotlight",
                uid: uid,
                action: "on"
            }));

            console.log("🎯 Spotlight ON:", uid);
        }

        return;
    }

    // 👤 STUDENT → normal pin
    if(pinnedUser === uid){
        pinnedUser = null;
    } else {
        pinnedUser = uid;
        setMainVideo(uid);
    }
});



let lastSwitch = 0;

client.enableAudioVolumeIndicator();

client.on("volume-indicator", volumes => {

    volumes.forEach(v => {

        if(v.level > 5){

            // 🔥 highlight speaker only
            document.querySelectorAll(".video-box")
                .forEach(b => b.classList.remove("active-speaker"));

            let activeBox = document.getElementById("video-" + v.uid);

            if(activeBox){
                activeBox.classList.add("active-speaker");
            }

            // 🔥 DO NOT SWITCH MAIN IF SCREEN IS SHARED
            if(!state.isScreenSharing){

                let now = Date.now();

                if(now - lastSwitch < 1500){

                    return;
                }

                lastSwitch = now;

                state.activeUser = v.uid;

                updateLayout();
            }
        }
    });

});

function setGrid(){
    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    main.innerHTML = "";
    side.innerHTML = "";

    Object.keys(users).forEach(uid => {
        let box = document.getElementById("video-" + uid);
        if(box){
            main.appendChild(box);
        }
    });
}

function setSpotlight(){
    // restore layout
    location.reload();
}

client.on("user-left", user => {

    delete users[user.uid];
    delete userMap[user.uid];

    let el = document.getElementById("video-" + user.uid);
    if(el) el.remove();

    updateParticipants();

    if(String(user.uid).includes("_screen")){

        state.isScreenSharing = false;
        state.screenUser = null;

        updateLayout();
    }
});

window.onload = () => {
    connectSocket();
};


function addEmoji(emoji){
    let input = document.getElementById("chat-message-input");
    input.value += emoji;
    input.focus();
}




function restoreLayoutExact(){

    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    let targetId = "video-" + layoutBeforeScreen.main;
    let targetBox = document.getElementById(targetId);

    if(!targetBox){
        console.log("❌ No main video found");
        return;
    }

    // 🔥 STEP 1: MOVE TARGET TO MAIN DIRECTLY
    main.appendChild(targetBox);

    // 🔥 STEP 2: UPDATE ACTIVE USER
    state.activeUser = layoutBeforeScreen.main;

    // 🔥 STEP 3: FIX SIDE ORDER
    layoutBeforeScreen.side.forEach(uid => {
        let box = document.getElementById("video-" + uid);
        if(box){
            side.appendChild(box);
        }
    });

    console.log("✅ Layout restored EXACTLY (no grid issue)");
}

function toggleRaiseHand(){

    let isRaised = raisedHands[client.uid];

    let action = isRaised ? "lower" : "raise";

    socket.send(JSON.stringify({
        type: "raise_hand",
        uid: client.uid,
        username: userMap[client.uid],
        action: action
    }));
}

function updateVideoHandIcon(uid){

    let box = document.getElementById("video-" + uid);
    if(!box) return;

    let existing = box.querySelector(".hand-icon");

    if(raisedHands[uid]){

        if(!existing){
            let icon = document.createElement("div");
            icon.className = "hand-icon";
            icon.innerText = "✋";
            box.appendChild(icon);
        }

    } else {
        if(existing) existing.remove();
    }
}

function sendReaction(emoji){
    socket.send(JSON.stringify({
        type: "reaction",
        uid: client.uid,
        emoji: emoji
    }));
}

function showReaction(uid, emoji){

    let box = document.getElementById("video-" + uid);
    if(!box) return;

    let r = document.createElement("div");
    r.className = "reaction";
    r.innerText = emoji;

    box.appendChild(r);

    // 🔥 FORCE MAIN
    isReacting = true;
    reactionUid = uid;

    updateMainView();

    setTimeout(() => {
        r.remove();
        isReacting = false;

        // 🔥 RESTORE PRIORITY
        if(isScreenSharing && screenUid){
            setMainVideo(screenUid);
        } else if(spotlightUser){
            setMainVideo(spotlightUser);
        } 
    }, 4000);
    isReacting = false;
    reactionUid = null;

    updateMainView();
}

function moveAllToSide(){

    let all = document.querySelectorAll(".video-box");

    all.forEach(box => {

        if(!document.getElementById("main-video").contains(box)){
            document.getElementById("side-videos").appendChild(box);
        }
    });
}

async function stopScreenShare(){

    if(screenTrack){

        screenTrack.stop();
        screenTrack.close();

        await screenClient.unpublish([screenTrack]);
        await screenClient.leave();

        screenTrack = null;

        state.isScreenSharing = false;
        state.screenUser = null;

        // 🔥 FORCE BACK TO SELF
        state.activeUser = UID;

        updateLayout();
    }
}

function renderExistingUsers(){

    Object.keys(users).forEach(uid => {

        if(!document.getElementById("video-" + uid)){

            let box = createVideoBox(uid, users[uid]);
            document.getElementById("side-videos").appendChild(box);
        }

    });
}

function updateMainView(){

    let target = null;

    // 🎯 PRIORITY SYSTEM
    if(isReacting && reactionUid){
        target = reactionUid;

    } else if(isScreenSharing && screenUid){
        target = screenUid;

    } else if(spotlightUser){
        target = spotlightUser;

    } else if(pinnedUser){
        target = pinnedUser;

    } else if(activeUser){
        target = activeUser;
    }

    if(target){
        setMainVideo(target);
    }
}

function renderAllVideos(){

    let side = document.getElementById("side-videos");

    Object.keys(users).forEach(uid => {

        if(!document.getElementById("video-" + uid)){

            let box = createVideoBox(uid, users[uid]);
            side.appendChild(box);
        }

    });
}

function moveToMain(uid){

    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    let target = document.getElementById("video-" + uid);
    if(!target) return;

    // clear main ONLY ONCE
    main.innerHTML = "";
    main.appendChild(target);

    // move others to grid
    document.querySelectorAll(".video-box").forEach(box => {
        if(box.id !== "video-" + uid){
            if(!side.contains(box)){
                side.appendChild(box);
            }
        }
    });
}

</script>
