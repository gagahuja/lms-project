{% extends 'base.html' %}

{% block content %}

    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body { margin:0; font-family: Arial; }

        .main {
            display: flex;
            height: 100vh;
        }

        .video-area {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 10px;
            padding: 10px;
            background: black;
        }

        .video-box {
            position: relative;
            background: black;
        }

        .video-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 3px 6px;
            font-size: 12px;
            border-radius: 5px;
        }

        .side {
            flex: 1;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .participants {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border-top: 1px solid #444;
        }

        input { width: 70%; }
    </style>
</head>

<body>

<div class="main">

    <div id="video-container" class="video-area"></div>

    <div class="side">
        <div id="chat-box" class="chat"></div>

        <div>
            <input id="chat-input">
            <button onclick="sendMessage()">Send</button>
        </div>

        <div id="participants" class="participants"></div>
    </div>

</div>

<script>

const APP_ID = "YOUR_AGORA_APP_ID";
const CHANNEL = "class_{{ live_class.id }}";

let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

let localTracks = [];
let userMap = {};

let protocol = location.protocol === "https:" ? "wss://" : "ws://";

let socket = new WebSocket(
    protocol + window.location.host + "/ws/chat/{{ live_class.id }}/"
);

// ================= SOCKET =================

socket.onmessage = function(e) {
    let data = JSON.parse(e.data);

    if (data.type === "chat") {
        addMessage(data.user, data.message);
    }

    if (data.type === "kick_user") {
        if (String(client.uid) === String(data.target)) {
            alert("You were removed");
            location.reload();
        }
    }

    if (data.type === "user_join") {
        userMap[data.uid] = data.username;
        updateParticipants();
    }
};

// ================= JOIN =================

async function joinStream() {

    let UID = Math.floor(Math.random()*10000);
    client.uid = UID;

    await client.join(APP_ID, CHANNEL, null, UID);

    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    userMap[client.uid] = "{{ request.user.username }}";

    socket.send(JSON.stringify({
        type: "user_join",
        uid: client.uid,
        username: "{{ request.user.username }}"
    }));

    let box = document.createElement("div");
    box.id = "user-" + client.uid;
    box.className = "video-box";

    document.getElementById("video-container").appendChild(box);

    localTracks[1].play(box);

    let label = document.createElement("div");
    label.className = "video-label";
    label.innerText = "{{ request.user.username }} 🎤";
    box.appendChild(label);

    await client.publish(localTracks);

    updateParticipants();
}

// ================= REMOTE =================

client.on("user-published", async (user, mediaType) => {

    await client.subscribe(user, mediaType);

    if (mediaType === "video") {

        let box = document.createElement("div");
        box.id = "user-" + user.uid;
        box.className = "video-box";

        document.getElementById("video-container").appendChild(box);

        user.videoTrack.play(box);

        let label = document.createElement("div");
        label.className = "video-label";

        let name = userMap[user.uid] || "User";
        label.innerText = name;

        box.appendChild(label);
    }

    if (mediaType === "audio") {
        user.audioTrack.play();
    }

    updateParticipants();
});

// ================= CHAT =================

function sendMessage() {
    let input = document.getElementById("chat-input");

    socket.send(JSON.stringify({
        type: "chat",
        message: input.value
    }));

    addMessage("You", input.value);
    input.value = "";
}

function addMessage(user, msg) {
    let box = document.getElementById("chat-box");
    box.innerHTML += `<div><b>${user}</b>: ${msg}</div>`;
}

// ================= PARTICIPANTS =================

function updateParticipants() {

    let div = document.getElementById("participants");
    div.innerHTML = "";

    for (let uid in userMap) {

        div.innerHTML += `
            <div>
                ${userMap[uid]}
                <button onclick="kickUser(${uid})">❌</button>
            </div>
        `;
    }
}

// ================= KICK =================

function kickUser(uid) {
    socket.send(JSON.stringify({
        type: "kick_user",
        target: uid
    }));
}

// ================= START =================

joinStream();

</script>

{% endblock %}
