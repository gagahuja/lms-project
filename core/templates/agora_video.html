{% extends 'base.html' %}

{% block content %}


    <title>Live Class</title>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .main {
            display: flex;
            height: 100vh;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 80px); /* adjust for header */
            width: 100%;
        }

        /* VIDEO */
        .video-section {
            flex: 1;  /* 🔥 MORE SPACE */
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
            height: 100%;
        }

        .video-area {
            flex:4;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:10px;
            padding:10px;
        }

        /* VIDEO BOX */
        .video-box {
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 600px;
            background: black;
            border-radius: 12px;
            overflow: hidden;
        }

        /* MAIN VIDEO SIZE */
        .main-video .video-box {
            width: 90%;
            height: 90%;
        }



        /* ACTIVE SPEAKER */
        .active-speaker {
            border: 3px solid #22c55e; /* green */
        }

        .video-label {
            position:absolute;
            bottom:5px;
            left:5px;
            background:rgba(0,0,0,0.6);
            padding:3px 6px;
            font-size:12px;
        }

        .video-layout {
            display: flex;
            height: 100%;
        }

        /* MAIN VIDEO */
        .main-video {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SIDE VIDEOS */
        .side-videos {
            height: 120px;
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
        }

        /* SIDE VIDEO SIZE */
        .side-videos .video-box {
            width: 150px;
            height: 100px;
        }

        /* Chat Container */
        #chat-container {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        /* CHAT PANEL */
        #right-panel {
            position: absolute;
            right: 10px;
            bottom: 10px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* CHAT SECTION */
        .chat-section {
            width: 300px;        /* fixed width */
            min-width: 250px;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            background: #111827;
        }

        /* Chat Box */
        #chat-box {
            height: 220px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        /* Message Bubble */
        .chat-msg {
            background: #1e293b;
            color: #e2e8f0;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
        }

        /* Input row */
        #chat-input-row {
            display: flex;
            gap: 5px;
        }

        #chat-message-input {
            flex: 1;
            padding: 6px;
            border-radius: 6px;
            border: none;
        }

        /* Username */
        .chat-user {
            color: #38bdf8;
            font-weight: 600;
        }

        /* Controls Row */
        #chat-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* INPUT */
        .chat-input-area {
            display: flex;
            padding: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 8px;
        }

        .chat-input-area button {
            margin-left: 5px;
        }

        /* Emoji Bar */
        #emoji-bar {
            display: flex;
            gap: 4px;
        }

        /* Emoji Buttons */
        #emoji-bar button {
            background: #1e293b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 4px;
        }

        /* Emoji row BELOW input */
        #emoji-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        #emoji-row button {
            background: #1e293b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* File row */
        #file-row {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }


        /* File Upload */
        #file-upload {
            margin-top: 6px;
            display: flex;
            gap: 5px;
        }


        .controls {
            position:fixed;
            bottom:15px;
            left:50%;
            transform:translateX(-50%);
        }

        button {
            margin:5px;
            padding:8px 12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .side { flex:1; display:flex; flex-direction:column; }

        .chat { flex:1; overflow:auto; padding:10px; }

        .participants {
            height: 120px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding: 10px;
            font-size: 14px;
        }

        /* Participants BELOW chat */
        #participants-panel {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
        }

        #participants-panel h4 {
            margin: 0 0 5px 0;
        }

    </style>


<div class="main">

    <div class="main-container">

        <!-- VIDEO AREA -->
        <div class="video-section">

            <div id="main-video" class="main-video"></div>

            <div id="side-videos" class="side-videos"></div>

        </div>

        <div id="right-panel">

            <!-- CHAT -->
            <div id="chat-container">
                <div id="chat-box"></div>

                <div id="chat-input-row">
                    <input id="chat-message-input" placeholder="Type message..." />
                    <button onclick="sendMessage()">Send</button>
                </div>

                <div id="emoji-row">
                    <button onclick="addEmoji('😊')">😊</button>
                    <button onclick="addEmoji('😂')">😂</button>
                    <button onclick="addEmoji('👍')">👍</button>
                    <button onclick="addEmoji('🙏')">🙏</button>
                </div>

                <div id="file-row">
                    <input type="file" id="fileInput">
                    <button onclick="uploadFile()">📎</button>
                </div>
            </div>

            <!-- PARTICIPANTS (NOW BELOW CHAT ✅) -->
            <div id="participants-panel">
                <h4>Participants</h4>
                <div id="participants-list"></div>
            </div>

        </div>
    </div>

</div>

<div class="controls">
    <button onclick="join()">Join</button>
    <button onclick="toggleMic()">Mic</button>
    <button onclick="toggleCam()">Cam</button>
    <button onclick="setGrid()">Grid</button>
    <button onclick="setSpotlight()">Spotlight</button>
    <button onclick="shareScreen()">Share</button>

    {% if request.user.is_staff %}
    <button onclick="muteAll()">Mute All</button>
    <button onclick="endClass()">End</button>
    {% endif %}

    <button onclick="leave()">Leave</button>
</div>

<script>

const APP_ID = "68983e3ac34747498d839a7e4c83a9c5";
const CHANNEL = "class_{{ live_class.id }}";

let client = AgoraRTC.createClient({mode:"rtc", codec:"vp8"});
let localTracks = [];

let userMap = {};
let isTeacher = "{{ request.user.is_staff }}" === "True";
let users = {};
let activeUser = null;

// SOCKET
let socket;

function connectSocket(retry = 0){

    let wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
    let roomName = window.location.pathname.split("/").filter(Boolean).pop();

    console.log("Connecting WS to room:", roomName);

    socket = new WebSocket(
        wsScheme + "://" + window.location.host + "/ws/chat/" + roomName + "/"
    );

    socket.onopen = () => {
        console.log("✅ WebSocket CONNECTED");
    };

    socket.onerror = (e) => {
        console.log("❌ WS ERROR", e);
    };

    socket.onclose = () => {
        console.log("❌ WS CLOSED");

        // 🔥 RETRY LOGIC (VERY IMPORTANT)
        if(retry < 5){
            setTimeout(() => {
                console.log("🔁 Retrying WS...", retry+1);
                connectSocket(retry + 1);
            }, 2000);
        }
    };

    socket.onmessage = e => {
        console.log("RECEIVED:", e.data);

        let data = JSON.parse(e.data);

        if(data.type === "chat"){

            let user = data.user || "User";

            // mark your own messages
            if(user === "{{ request.user.username }}"){
                user = "You";
            }

            // 🔥 THIS IS THE LINE YOU WERE ASKING ABOUT
            addMessage(user, data.message);
        }

        if(data.type === "kick"){
            if(String(client.uid) === String(data.target)){
                alert("Kicked by teacher");
                leave();
            }
        }

        if(data.type === "mute_all"){
            if(localTracks[0]) localTracks[0].setEnabled(false);
        }

        if(data.type === "end_class"){
            alert("Class Ended");
            leave();
        }
    };
}

// JOIN
async function join(){

    let UID = Math.floor(Math.random()*10000);
    client.uid = UID;

    await client.join(APP_ID, CHANNEL, null, UID);

    localTracks = await AgoraRTC.createMicrophoneAndCameraTracks();

    let box = createVideoBox(UID, "{{ request.user.username }}");

    document.getElementById("main-video").appendChild(box);

    localTracks[1].play("user-" + UID);

    users[UID] = "{{ request.user.username }}";  // ✅ FIX
    updateParticipants();

    activeUser = UID;

    await client.publish(localTracks);
}




// REMOTE
client.on("user-published", async(user, mediaType)=>{

    await client.subscribe(user, mediaType);

    if(mediaType === "video"){

        let box = createVideoBox(user.uid, "User");

        document.getElementById("side-videos").appendChild(box);

        user.videoTrack.play("user-" + user.uid);

        users[user.uid] = "User";
        updateParticipants();
    }

    if(mediaType === "audio"){
        user.audioTrack.play();
    }
});

// VIDEO BOX
function createVideoBox(uid, name){

    let box = document.createElement("div");
    box.className = "video-box";
    box.id = "user-" + uid;

    let label = document.createElement("div");
    label.className = "video-label";
    label.innerText = name + " 🎤";

    box.appendChild(label);

    return box;
}

// CHAT
function sendMessage(){
    let input = document.getElementById("chat-message-input");

    if(!input){
        console.error("Input not found");
        return;
    }

    let message = input.value.trim();

    if(!message) return;

    if(!socket || socket.readyState !== 1){
        alert("Chat not connected");
        return;
    }

    socket.send(JSON.stringify({
        type: "chat",
        message: message
    }));

    input.value = "";
}

function addMessage(user, msg){
    let box = document.getElementById("chat-box");

    let div = document.createElement("div");
    div.className = "chat-msg";

    let name = document.createElement("span");
    name.className = "chat-user";
    name.innerText = user + ": ";

    let content = document.createElement("span");

    if(msg.startsWith("📎 FILE:")){
        let parts = msg.replace("📎 FILE:", "").split("|");
        let url = parts[0];
        let fname = parts[1];

        let link = document.createElement("a");
        link.href = url;
        link.target = "_blank";
        link.innerText = "📎 " + fname;
        link.style.color = "#4ade80";

        content.appendChild(link);
    } else {
        content.innerText = msg;
    }

    div.appendChild(name);
    div.appendChild(content);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}


// PARTICIPANTS
function updateParticipants(){
    let div = document.getElementById("participants");

    if(!div) return;

    div.innerHTML = "";

    Object.keys(users).forEach(uid => {

        let item = document.createElement("div");

        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.style.marginBottom = "5px";

        item.innerHTML = `
            <span>${users[uid]}</span>
            ${isTeacher ? `<button onclick="kick(${uid})">❌</button>` : ""}
        `;

        div.appendChild(item);
    });
}

// CONTROLS
function toggleMic(){
    if(localTracks[0]){
        let enabled = !localTracks[0].enabled;
        localTracks[0].setEnabled(enabled);

        let label = document.querySelector("#user-" + client.uid + " .video-label");
        if(label){
            label.innerText = "{{ request.user.username }}" + (enabled ? " 🎤" : " 🔇");
        }
    }
}

function toggleCam(){
    if(localTracks[1]) localTracks[1].setEnabled(!localTracks[1].enabled);
}

function shareScreen(){
    alert("Screen share basic version active");
}

function muteAll(){
    socket.send(JSON.stringify({type:"mute_all"}));
}

function endClass(){
    socket.send(JSON.stringify({type:"end_class"}));
}

function kick(uid){
    socket.send(JSON.stringify({type:"kick", target:uid}));
}

function leave(){
    location.reload();
}


async function uploadFile(){
    let fileInput = document.getElementById("fileInput");
    let file = fileInput.files[0];

    if(!file){
        alert("Select file first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch("/upload/", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if(data.url){
        socket.send(JSON.stringify({
            type: "chat",
            message: `📎 FILE:${data.url}|${data.name}`
        }));
    } else {
        alert("Upload failed");
    }
}


// ENTER key to send message
document.getElementById("chat-input").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        e.preventDefault(); // prevents newline / form issues
        sendMessage();
    }
});


document.addEventListener("click", function(e){
    let box = e.target.closest(".video-box");
    if(!box) return;

    let uid = box.id.replace("user-", "");

    setMainVideo(uid);
});


function setMainVideo(uid){

    if(activeUser == uid) return; // 🔥 IMPORTANT

    let main = document.getElementById("main-video");
    let selected = users[uid];

    if(!selected) return;

    document.querySelectorAll(".video-box")
        .forEach(b => b.classList.remove("active-speaker"));

    selected.classList.add("active-speaker");

    main.innerHTML = "";
    main.appendChild(selected);

    activeUser = uid;
}


client.enableAudioVolumeIndicator();

let lastSwitch = 0;

client.on("volume-indicator", volumes => {
    volumes.forEach(v => {

        if(v.level > 5){
            let now = Date.now();

            if(now - lastSwitch > 2000){ // 🔥 2 sec delay
                setMainVideo(v.uid);
                lastSwitch = now;
            }
        }

    });
});


function setGrid(){
    let main = document.getElementById("main-video");
    let side = document.getElementById("side-videos");

    side.innerHTML = "";

    Object.values(users).forEach(box=>{
        main.appendChild(box);
    });
}

function setSpotlight(){
    // restore layout
    location.reload();
}

client.on("user-left", user => {

    delete users[user.uid];

    let el = document.getElementById("user-" + user.uid);
    if(el) el.remove();

    updateParticipants();
});

window.onload = () => {
    connectSocket();
};


function addEmoji(emoji){
    let input = document.getElementById("chat-message-input");
    input.value += emoji;
    input.focus();
}

</script>

{% endblock %}
