{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>

.meeting-layout{

    width:100%;

    display:flex;

    flex-direction:column;

    gap:20px;
}


/* MAIN VIDEO */

.main-stage{

    width:100%;

    height:520px;

    background:#111;

    border-radius:24px;

    overflow:hidden;

    position:relative;
}

.main-video-tile{

    width:100%;

    height:100%;

    position:relative;
}


/* GRID */

.video-grid{

    display:flex;

    gap:16px;

    flex-wrap:wrap;

    justify-content:flex-start;

    align-items:flex-start;
}

.grid-video-tile{

    width:260px;

    height:170px;

    background:#111;

    border-radius:20px;

    overflow:hidden;

    position:relative;

    flex-shrink:0;
}


/* PLAYER */

.video-player{

    width:100%;

    height:100%;
}


/* LABEL */

.video-name{

    position:absolute;

    bottom:12px;

    left:12px;

    background:
        rgba(0,0,0,.6);

    color:white;

    padding:8px 14px;

    border-radius:10px;

    font-size:14px;
}

</style>


<div class="live-wrapper">

    <h2>
        Live Class v2
    </h2>

    <div class="meeting-layout">

        <div
            id="main-stage"
            class="main-stage">
        </div>

        <div
            id="video-grid"
            class="video-grid">
        </div>

    </div>

    <div class="controls">

        <button
            id="join-btn"
            class="join-btn">

            Join Class

        </button>

        <button
            id="share-btn">

            Share Screen

        </button>

        <button
            id="leave-btn"
            class="leave-btn">

            Leave

        </button>

    </div>

</div>


<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>


<script type="module">

import {
    initRTC,
    joinRoom,
    startScreenShare
}
from "{% static 'js/liveclass_v2/rtc.js' %}";

const APP_ID =
    "68983e3ac34747498d839a7e4c83a9c5";

const CHANNEL =
    "{{ room_name|default:'test-room' }}";

const USERNAME =
    "{{ request.user.username }}";


await initRTC();

document
.getElementById(
    "join-btn"
)
.addEventListener(
    "click",
    async () => {

    await joinRoom({

        appId:
            APP_ID,

        channel:
            CHANNEL,

        token:
            null,

        uid:
            String(
                Date.now()
            ),

        username:
            USERNAME
    });
});

document
.getElementById(
    "share-btn"
)
.addEventListener(
    "click",
    async () => {

    await
    startScreenShare();
});

</script>

{% endblock %}
