{% extends 'base.html' %}

{% block content %}

<h3>{{ class.title }}</h3>

<div class="row">

    <!-- VIDEO CLASS -->
    <div class="col-md-8">
        <div class="card p-2">
            <iframe 
                src="{{ class.meet_link }}" 
                width="100%" 
                height="500" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <!-- WHITEBOARD -->
    <div class="col-md-4">
        <div class="card p-2">
            <h5>🧠 Whiteboard</h5>

            {% if class.whiteboard_link %}
                <iframe 
                    src="{{ class.whiteboard_link }}" 
                    width="100%" 
                    height="500">
                </iframe>
            {% else %}
                <p>No whiteboard added</p>
            {% endif %}
        </div>
    </div>

</div>

{% endblock %}
