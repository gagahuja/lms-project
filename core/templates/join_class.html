<!DOCTYPE html>
<html>
<head>
    <title>Join Class</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container text-center mt-5">
    <h2>{{ class.title }}</h2>

    <a href="{{ class.meet_link }}" target="_blank" class="btn btn-success m-2">
        🎥 Join Google Meet
    </a>

    {% if class.whiteboard_link %}
    <a href="{{ class.whiteboard_link }}" target="_blank" class="btn btn-warning m-2">
        📝 Open Whiteboard
    </a>
    {% endif %}
</div>

</body>
</html>
