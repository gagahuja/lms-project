{% extends 'base.html' %}
{% block content %}

<h2>🏆 Leaderboard</h2>

{% for item in students %}
<div class="card p-3 mb-2 d-flex justify-content-between">
    <strong>{{ item.student.username }}</strong>
    <span class="badge bg-warning">{{ item.points }} pts</span>
</div>
{% endfor %}

{% endblock %}
