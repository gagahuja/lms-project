<!DOCTYPE html>
<html>
<head>
    <title>LMS</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f5f7fb;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111827;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: #cbd5e1;
            display: block;
            margin: 12px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            color: white;
        }

        .main {
            margin-left: 260px;
            padding: 20px;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>🚀 LMS</h4>
    <hr>

    <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/leaderboard/"><i class="bi bi-trophy"></i> Leaderboard</a>
    <a href="/create-course/"><i class="bi bi-plus-circle"></i> Create Course</a>
    <a href="/logout/"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
