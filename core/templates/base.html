<!DOCTYPE html>
<html>
<head>
    <title>LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">🎓 ScoreSkill</a>

    <div class="ms-auto">
        {% if request.user.is_authenticated %}
            <a href="/dashboard/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
        {% else %}
            <a href="/login/" class="btn btn-outline-light btn-sm me-2">Login</a>
            <a href="/signup/" class="btn btn-success btn-sm">Signup</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
