<!DOCTYPE html>
<html>
<head>
    <title>LMS</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f5f7fb;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #111827;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: #cbd5e1;
            display: block;
            margin: 12px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            color: white;
        }

        .main {
            margin-left: 260px;
        }

        @media (max-width: 768px) {
            .main {
                margin-left: 0;
            }
        }

        .card {
            border-radius: 12px;
        }

        .dark-mode {
            background-color: #0f172a !important;
            color: white !important;
        }

        .dark-mode .card {
            background-color: #1e293b;
            color: white;
        }

        .dark-mode .sidebar {
            background: #020617;
        }

        .dark-mode a {
            color: #94a3b8 !important;
        }


        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>
        <img src="/static/logo.png" width="30">
        ScoreSkill
    </h4>
    <hr>
    <button onclick="toggleDarkMode()" class="btn btn-sm btn-light mb-3">
        🌙 Toggle Mode
    </button>
    <a href="/dashboard/"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/leaderboard/"><i class="bi bi-trophy"></i> Leaderboard</a>
    <a href="/create-course/"><i class="bi bi-plus-circle"></i> Create Course</a>
    <a href="/logout/"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    {% block content %}
    {% endblock %}
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// Load saved mode
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
}
</script>
</body>
</html>
